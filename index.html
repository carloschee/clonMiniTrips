<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Meta etiquetas cruciales para iPhone 13 y PWA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mini Trips">
<meta name="theme-color" content="#87CEEB">

<title>Mini Trips!</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --sky-top: #87CEEB;
    --sky-bottom: #B8E4F9;
    --ground: #6BBF4E;
    --ground-dark: #4E9B35;
    --water: #3A9FD8;
    --water-dark: #2278A8;
    --dirt: #A0522D;
    --dirt-dark: #8B4513;
    --sand: #F5D77A;
    --cloud: #FFFFFF;
    --sun: #FFD93D;
    --ui-bg: #FFF8EC;
    --ui-shadow: rgba(0,0,0,0.18);
    --btn-green: #5DD15A;
    --btn-green-dark: #3FAD3C;
    --btn-orange: #FF8A3D;
    --btn-orange-dark: #E06820;
    --btn-blue: #4FC3F7;
    --btn-blue-dark: #29B6F6;
  }

  /* Reset y preparación para iPhone 13 */
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background-color: var(--sky-top);
    touch-action: none;
  }

  h1, h2, h3 {
    font-family: 'Fredoka One', cursive;
    margin: 0;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
  }

  /* Sistema de Pantallas */
  .screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: env(safe-area-inset-top, 47px);
    padding-bottom: env(safe-area-inset-bottom, 34px);
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    z-index: 10;
  }

  .screen.active {
    display: flex;
  }

  /* HOME SCREEN */
  #home-screen {
    justify-content: center;
    gap: 20px;
    background: var(--ui-bg);
  }
  
  .title-card {
    background: white;
    padding: 30px;
    border-radius: 30px;
    box-shadow: 0 10px 20px var(--ui-shadow);
    text-align: center;
    margin-bottom: 20px;
    border: 4px solid var(--sky-bottom);
  }

  .title-card h1 {
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    color: var(--btn-orange);
    white-space: nowrap;
    margin: 0;
  }

  .mode-selector {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 90%;
  }

  .mode-btn {
    width: 120px;
    height: 120px;
    border-radius: 30px;
    border: none;
    background-color: white;
    background-size: 60%; /* Escala la imagen para que encaje bien en el botón */
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 8px 0 var(--sky-bottom);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mode-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--sky-bottom);
    border: 4px solid var(--btn-orange);
  }

  .play-btn {
    background: var(--btn-green);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    padding: 15px 50px;
    border: none;
    border-radius: 30px;
    box-shadow: 0 8px 0 var(--btn-green-dark);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .play-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--btn-green-dark);
  }

  /* GAME SCREEN */
  #game-screen {
    justify-content: space-between;
    overflow: hidden;
  }

  .game-header {
    width: 90%;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 50;
  }

  .back-btn {
    background: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    order: 2; /* Mueve el botón de regreso a la derecha */
  }
  .back-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }

  .progress-bar {
    flex-grow: 1;
    height: 25px;
    background: rgba(255,255,255,0.5);
    border-radius: 12.5px;
    border: 3px solid white;
    overflow: hidden;
    position: relative;
    order: 1; /* Mantiene la barra a la izquierda */
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--btn-orange);
    transition: width 0.1s linear;
  }

  .environment {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50%;
    background: var(--ground);
    border-top: 10px solid var(--ground-dark);
    z-index: 1;
  }

  .scenery {
    position: absolute;
    width: 200%;
    height: 100%;
    bottom: 0;
    left: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.05) 10%, transparent 10%);
    background-size: 40px 40px;
    z-index: 2;
  }

  /* CONTENEDOR DE PISTA DINÁMICA */
  #track {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 15; /* Detrás del jugador, pero encima del fondo */
  }

  /* Elementos de la Pista */
  .start-line, .finish-line {
    position: absolute;
    width: 20px;
    height: 140px;
    background: repeating-linear-gradient(0deg, #fff, #fff 15px, #000 15px, #000 30px);
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    box-shadow: 3px 0 10px rgba(0,0,0,0.2);
    border-radius: 5px 5px 0 0;
  }
  
  .start-line::after {
    content: 'INICIO';
    position: absolute;
    bottom: 150px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-green);
  }

  .finish-line::after {
    content: 'META';
    position: absolute;
    bottom: 150px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-orange);
  }

  .finish-line::before {
    content: '🏁';
    position: absolute;
    bottom: 190px;
    font-size: 4rem;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3));
  }

  .track-marker {
    position: absolute;
    background: var(--btn-blue);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    border: 4px solid white;
    box-shadow: 0 4px 0 var(--btn-blue-dark), 0 6px 10px rgba(0,0,0,0.2);
    transform: translateX(-50%);
  }

  .track-marker::after {
    content: '';
    position: absolute;
    top: 100%;
    width: 8px;
    height: 35px;
    background: #D7CCC8;
    border: 2px solid #8D6E63;
    border-top: none;
    z-index: -1;
    border-radius: 0 0 4px 4px;
  }

  .track-decor {
    position: absolute;
    font-size: 3.5rem;
    transform: translateX(-50%);
    filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
  }

  /* JUGADOR */
  #player {
    position: absolute;
    bottom: 20%;
    left: 50%;
    --facing: 1;
    transform: translateX(-50%) scaleX(var(--facing));
    font-size: 5rem;
    z-index: 30;
    /* transition: bottom 0.3s; - Removida para usar motor de gravedad manual */
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  .instructions {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-weight: 900;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 40;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    transition: opacity 0.3s;
  }

  /* Efecto de partículas */
  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 25;
    pointer-events: none;
    opacity: 1;
    animation: fadeOutUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes fadeOutUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100px) scale(0); opacity: 0; }
  }

  @keyframes float {
    0%, 100% { transform: translateX(-50%) scaleX(var(--facing)) translateY(0); }
    50% { transform: translateX(-50%) scaleX(var(--facing)) translateY(-10px); }
  }

  /* CHARCOS DE AGUA */
  .puddle {
    position: absolute;
    background: rgba(58, 159, 216, 0.7);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    width: 140px;
    height: 35px;
    transform: translateX(-50%);
    z-index: 10;
  }

  /* WIN SCREEN */
  #win-screen {
    justify-content: center;
    background: var(--btn-green);
    color: white;
  }
  
  .trophy {
    font-size: 6rem;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  .time-text {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 20px 0 40px 0;
    background: rgba(0,0,0,0.1);
    padding: 10px 20px;
    border-radius: 20px;
  }

</style>
</head>
<body>

  <!-- PANTALLA DE INICIO -->
  <div id="home-screen" class="screen active">
    <div class="title-card">
      <h1>Mini Trips!</h1>
    </div>

    <div class="mode-selector">
      <button class="mode-btn" data-mode="coche" onpointerdown="selectMode('coche')" style="background-image: url('sprites/coche.png');"></button>
      <button class="mode-btn" data-mode="tren" onpointerdown="selectMode('tren')" style="background-image: url('sprites/tren.png');"></button>
      <button class="mode-btn" data-mode="barco" onpointerdown="selectMode('barco')" style="background-image: url('sprites/barco.png');"></button>
      <button class="mode-btn" data-mode="avion" onpointerdown="selectMode('avion')" style="background-image: url('sprites/avion.png');"></button>
    </div>
  </div>

  <!-- PANTALLA DE JUEGO -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="back-btn" id="back-btn">⬅️</button>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="environment" id="environment">
      <div class="scenery" id="scenery"></div>
    </div>

    <div id="track"></div>

    <div id="player" style="animation: float 2s infinite ease-in-out;">🚗</div>

    <div class="instructions" id="game-hints">
      Toca los lados para avanzar.<br>¡Desliza rápido para acelerar!
    </div>
  </div>

  <!-- PANTALLA DE VICTORIA -->
  <div id="win-screen" class="screen">
    <div class="trophy">🏆</div>
    <h1>¡LLEGASTE!</h1>
    <div class="time-text">Tiempo: <span id="time-display">0.0</span>s</div>
    <button class="play-btn" style="background: var(--btn-orange); box-shadow: 0 8px 0 var(--btn-orange-dark);" onpointerdown="goHome()">Volver al Menú</button>
  </div>

<script>
  // --- INYECCIÓN DE MANIFEST PWA ---
  const manifestJSON = {
    "name": "Mini Trips",
    "short_name": "Mini Trips",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#87CEEB",
    "theme_color": "#87CEEB",
    "icons": [
      {
        "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2387CEEB'/%3E%3Ctext y='65' x='15' font-size='60'%3E🚗%3C/text%3E%3C/svg%3E",
        "sizes": "192x192",
        "type": "image/svg+xml"
      }
    ]
  };
  const linkManifest = document.createElement('link');
  linkManifest.rel = 'manifest';
  linkManifest.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestJSON));
  document.head.appendChild(linkManifest);

  // --- VARIABLES DEL JUEGO ---
  let currentMode = 'coche';
  let isRunning = false;
  let progress = 0; // 0 a 100
  let speed = 0;
  let maxSpeed = 25; 
  let mediumSpeed = 4;
  let distanceScrolled = 0;
  let startTime = 0;
  let gameLoopReq;

  // Variables de control táctil y vertical
  let isTouching = false;
  let touchX = 0;
  let lastTouchX = 0;
  let touchY = 0;
  let lastTouchY = 0;
  let lastTouchTime = 0;

  // Motor de Gravedad
  let yPos = 0;
  let ySpeed = 0;
  let baseY_px = 0;
  let gravity = 0.6;

  // Sistema de Terreno y Charcos
  let terrainSeeds = null;
  let puddlesData = [];
  let puddlesHit = [];

  // Longitud de la pista física (Niveles 10x más largos)
  const TRACK_LENGTH = 20000;

  // Configuración por modo de transporte
  const config = {
    coche: { 
      emoji: '🚗', 
      envColor: 'var(--ground)', 
      borderColor: 'var(--ground-dark)', 
      bottomPos: '25%',
      particleColors: ['#FFD93D', '#FFFFFF', '#AAAAAA'],
      decor: ['🌲', '🌳', '🪨', '🍄', '🌻', '🛑', '🪵']
    },
    tren: { 
      emoji: '🚂', 
      envColor: 'var(--dirt)', 
      borderColor: 'var(--dirt-dark)', 
      bottomPos: '25%',
      particleColors: ['#555555', '#333333', '#888888', '#FFD93D'],
      decor: ['🌵', '🛖', '⛰️', '🐄', '🤠', '🛤️', '🪨']
    },
    barco: { 
      emoji: '⛵', 
      envColor: 'var(--water)', 
      borderColor: 'var(--water-dark)', 
      bottomPos: '35%',
      particleColors: ['#FFFFFF', '#B8E4F9', '#4FC3F7'],
      decor: ['🌊', '🏝️', '🛟', '🐟', '⛵', '🐙', '⚓']
    },
    avion: { 
      emoji: '✈️', 
      envColor: 'transparent', 
      borderColor: 'transparent', 
      bottomPos: '60%',
      particleColors: ['#FFFFFF', '#FFFFFF', '#B8E4F9'],
      decor: ['☁️', '🦅', '🎈', '⛅', '✨', '🛸', '🚁']
    }
  };

  // --- LÓGICA DE TERRENO ---
  function getTerrainHeight(x) {
    if (currentMode !== 'coche' && currentMode !== 'tren') return 0;
    if (!terrainSeeds) return 0;
    
    // Suavizado en el inicio y la meta para que sean zonas planas
    let fade = 1;
    if (x < 1500) fade = x / 1500;
    else if (x > TRACK_LENGTH - 1500) fade = (TRACK_LENGTH - x) / 1500;
    
    // Combinación de ondas seno y coseno para colinas aleatorias
    const h1 = Math.sin(x / terrainSeeds.f1) * terrainSeeds.a1;
    const h2 = Math.cos(x / terrainSeeds.f2) * terrainSeeds.a2;
    const h3 = Math.sin(x / terrainSeeds.f3) * terrainSeeds.a3;
    
    return (h1 + h2 + h3) * fade;
  }

  // --- LÓGICA DE INTERFAZ Y PISTA ---

  function selectMode(mode) {
    currentMode = mode;
    startGame(); // Inicia el recorrido automáticamente al elegir el vehículo
  }

  function goHome() {
    isRunning = false;
    cancelAnimationFrame(gameLoopReq);
    document.getElementById('win-screen').classList.remove('active');
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('active');
  }

  // Cambio de 'click' a 'pointerdown' para el botón de regreso
  document.getElementById('back-btn').addEventListener('pointerdown', goHome);

  function generateTrack() {
    const track = document.getElementById('track');
    track.innerHTML = ''; // Limpiar pista
    const cfg = config[currentMode];
    
    // Necesitamos baseY_px aquí para posicionar correctamente los elementos
    baseY_px = (parseFloat(cfg.bottomPos) / 100) * window.innerHeight;

    // --- DIBUJAR TERRENO (Carretera o Vías) ---
    const svgHeight = 2000; // Alto suficiente para cubrir elevaciones
    if (currentMode === 'coche' || currentMode === 'tren') {
      let svgHTML = `<svg id="terrain-svg" width="${TRACK_LENGTH}" height="${svgHeight}" style="position:absolute; bottom:0; left:0; overflow:visible; z-index: 5;">`;
      let pathData = `M 0,${svgHeight - baseY_px} `;
      
      for (let x = 0; x <= TRACK_LENGTH; x += 100) {
          pathData += `L ${x},${svgHeight - (baseY_px + getTerrainHeight(x))} `;
      }

      if (currentMode === 'coche') {
          // Carretera gris con líneas discontinuas blancas
          svgHTML += `<path d="${pathData}" fill="none" stroke="var(--ground-dark)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 5)"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#606060" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="20, 30" stroke-linecap="round" stroke-linejoin="round"/>`;
      } else {
          // Vías de tren con durmientes de madera
          svgHTML += `<path d="${pathData}" fill="none" stroke="#5D4037" stroke-width="35" stroke-dasharray="8, 24" stroke-linecap="round" stroke-linejoin="round"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -12)"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 12)"/>`;
      }
      svgHTML += `</svg>`;
      track.insertAdjacentHTML('beforeend', svgHTML);
    } else if (currentMode === 'avion') {
      // DIBUJAR PISTAS DE ATERRIZAJE PARA EL AVIÓN
      let runwayY_px = (20 / 100) * window.innerHeight; // Las pistas estarán al 20% de altura
      let svgHTML = `<svg id="terrain-svg" width="${TRACK_LENGTH}" height="${svgHeight}" style="position:absolute; bottom:0; left:0; overflow:visible; z-index: 5;">`;

      // Base Verde y Pista de Inicio (Despegue extendido hacia atrás para llenar la pantalla)
      svgHTML += `<rect x="-2000" y="${svgHeight - runwayY_px}" width="4000" height="2000" fill="#6BBF4E" />`;
      svgHTML += `<rect x="-2000" y="${svgHeight - runwayY_px}" width="4000" height="25" fill="#555555" />`;
      svgHTML += `<line x1="-2000" y1="${svgHeight - runwayY_px + 12}" x2="2000" y2="${svgHeight - runwayY_px + 12}" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="40, 60" />`;

      // Base Verde y Pista de Meta (Aterrizaje extendido hacia adelante)
      svgHTML += `<rect x="${TRACK_LENGTH - 2000}" y="${svgHeight - runwayY_px}" width="4000" height="2000" fill="#6BBF4E" />`;
      svgHTML += `<rect x="${TRACK_LENGTH - 2000}" y="${svgHeight - runwayY_px}" width="4000" height="25" fill="#555555" />`;
      svgHTML += `<line x1="${TRACK_LENGTH - 2000}" y1="${svgHeight - runwayY_px + 12}" x2="${TRACK_LENGTH + 2000}" y2="${svgHeight - runwayY_px + 12}" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="40, 60" />`;

      svgHTML += `</svg>`;
      track.insertAdjacentHTML('beforeend', svgHTML);
    }

    // --- GENERAR CHARCOS ---
    puddlesData = [];
    puddlesHit = [];
    if (currentMode === 'coche' || currentMode === 'tren') {
        for (let px = 2000; px < TRACK_LENGTH - 2000; px += 400 + Math.random() * 800) {
            if (Math.random() > 0.5) { // 50% de probabilidad de generar un charco en este punto
                puddlesData.push(px);
                const th = getTerrainHeight(px);
                const puddle = document.createElement('div');
                puddle.className = 'puddle';
                puddle.style.left = px + 'px';
                puddle.style.bottom = (baseY_px + th - 15) + 'px';
                track.appendChild(puddle);
            }
        }
    }

    // Altura dinámica para las banderas de inicio/meta
    let lineBottomPos = cfg.bottomPos;
    if (currentMode === 'avion') lineBottomPos = '20%'; // Banderas en la pista para el avión

    // 1. Línea de Inicio
    const start = document.createElement('div');
    start.className = 'start-line';
    start.style.left = '0px';
    start.style.bottom = lineBottomPos;
    track.appendChild(start);

    // 2. Línea de Meta
    const finish = document.createElement('div');
    finish.className = 'finish-line';
    finish.style.left = TRACK_LENGTH + 'px';
    finish.style.bottom = lineBottomPos;
    track.appendChild(finish);

    // 3. Marcadores de Regresiva (del 10 al 1 distribuidos equitativamente)
    for (let i = 1; i <= 10; i++) {
        const marker = document.createElement('div');
        marker.className = 'track-marker';
        marker.innerText = (11 - i); // Etiqueta: 10 descendiendo a 1
        
        // Calcular posición en porcentaje (dividido en 11 segmentos para poner 10 en medio)
        const progressPct = i * (100 / 11); 
        const markerX = TRACK_LENGTH * (progressPct / 100);
        marker.style.left = markerX + 'px';
        marker.style.bottom = (baseY_px + getTerrainHeight(markerX) + 35) + 'px'; // Ajuste al terreno
        track.appendChild(marker);
    }

    // 4. Elementos Decorativos Aleatorios
    const items = cfg.decor;
    const numDecor = 80; // Cantidad de decoraciones a generar
    
    for (let i = 0; i < numDecor; i++) {
        const el = document.createElement('div');
        el.className = 'track-decor';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        
        // Posición aleatoria evitando que tapen las líneas de inicio y meta
        const pos = 600 + Math.random() * (TRACK_LENGTH - 1200);
        el.style.left = pos + 'px';
        
        // Dispersión vertical
        let vOffset = (Math.random() - 0.5) * 60; 
        if (currentMode === 'avion') {
            vOffset = (Math.random() - 0.4) * 300; // El avión tiene más espacio aéreo
        }
        
        el.style.bottom = (baseY_px + getTerrainHeight(pos) + vOffset) + 'px'; // Ajuste al terreno
        
        // Escala y Profundidad aleatorias
        const scale = 0.6 + Math.random() * 1.2;
        el.style.transform = `translateX(-50%) scale(${scale})`;
        el.style.zIndex = Math.random() > 0.5 ? 20 : 35; // Frente o detrás del jugador
        
        track.appendChild(el);
    }
  }

  function startGame() {
    const env = document.getElementById('environment');
    const player = document.getElementById('player');
    const cfg = config[currentMode];

    env.style.background = cfg.envColor;
    env.style.borderTopColor = cfg.borderColor;
    player.style.bottom = cfg.bottomPos;
    player.style.setProperty('--facing', '1');

    // Siempre carga los sprites locales por defecto
    player.innerHTML = '';
    player.style.backgroundImage = `url('sprites/${currentMode}.png')`;

    // Generar semillas aleatorias para el terreno
    terrainSeeds = {
      a1: 30 + Math.random() * 50,
      f1: 500 + Math.random() * 500,
      a2: 20 + Math.random() * 30,
      f2: 250 + Math.random() * 200,
      a3: 10 + Math.random() * 20,
      f3: 100 + Math.random() * 100
    };

    // Configurar Motor de Gravedad inicial
    baseY_px = (parseFloat(cfg.bottomPos) / 100) * window.innerHeight;
    
    if (currentMode === 'avion') {
      yPos = (20 / 100) * window.innerHeight; // Fuerza inicio en la pista
    } else {
      yPos = baseY_px;
    }
    
    ySpeed = 0;
    player.style.bottom = yPos + 'px';
    player.style.opacity = '1';

    // Generar nuevo nivel
    generateTrack();

    progress = 0;
    speed = 0;
    distanceScrolled = 0;
    isTouching = false;
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('game-hints').style.opacity = '1';
    startTime = Date.now();
    isRunning = true;

    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');

    gameLoop();
  }

  // --- CONTROLES TÁCTILES ---
  const gameScreen = document.getElementById('game-screen');
  
  const hideHints = () => { document.getElementById('game-hints').style.opacity = '0'; };

  gameScreen.addEventListener('pointerdown', (e) => {
    if (!isRunning || e.target.id === 'back-btn') return;
    isTouching = true;
    touchX = e.clientX;
    lastTouchX = e.clientX;
    touchY = e.clientY;
    lastTouchY = e.clientY;
    lastTouchTime = Date.now();
    hideHints();
  });

  gameScreen.addEventListener('pointermove', (e) => {
    if (!isRunning || !isTouching) return;
    const now = Date.now();
    const dt = now - lastTouchTime;
    touchX = e.clientX;
    touchY = e.clientY;
    
    if (dt > 0) {
      const swipeVelocityX = (touchX - lastTouchX) / dt;
      speed += swipeVelocityX * 6; // Sensibilidad del acelerón horizontal
      
      // Físicas Verticales (Swipe arriba/abajo)
      const swipeVelocityY = (lastTouchY - touchY) / dt; // Positivo es hacia ARRIBA
      if (currentMode !== 'tren') {
        let clampedY = Math.max(-15, Math.min(15, swipeVelocityY));
        ySpeed += clampedY * 1.5; // Fuerza del salto o inmersión
      }
    }
    
    lastTouchX = touchX;
    lastTouchY = touchY;
    lastTouchTime = now;
  });

  const endTouch = () => { isTouching = false; };
  gameScreen.addEventListener('pointerup', endTouch);
  gameScreen.addEventListener('pointercancel', endTouch);
  gameScreen.addEventListener('pointerleave', endTouch);

  function spawnParticle(direction) {
    const cfg = config[currentMode];
    const c = cfg ? cfg.particleColors : ['#FFD93D'];
    const p = document.createElement('div');
    const playerRect = document.getElementById('player').getBoundingClientRect();
    
    p.className = 'particle';
    p.style.background = c[Math.floor(Math.random() * c.length)];
    p.style.width = p.style.height = (8 + Math.random() * 6) + 'px';
    
    const offset = direction > 0 ? -25 : 25;
    const leftOffset = playerRect.left + (playerRect.width / 2) + offset + (Math.random() * 20 - 10);
    const bottomOffset = window.innerHeight - playerRect.bottom + (Math.random() * 20);
    
    p.style.left = leftOffset + 'px';
    p.style.bottom = bottomOffset + 'px';
    
    document.getElementById('game-screen').appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }

  // --- BUCLE PRINCIPAL ---
  function gameLoop() {
    if (!isRunning) return;

    let targetSpeed = 0;
    const screenCenter = window.innerWidth / 2;

    if (isTouching) {
      targetSpeed = (touchX > screenCenter) ? mediumSpeed : -mediumSpeed;
      if (targetSpeed > 0 && speed < targetSpeed) speed += 0.5;
      if (targetSpeed < 0 && speed > targetSpeed) speed -= 0.5;
    }

    speed *= 0.93; // Fricción
    if (speed > maxSpeed) speed = maxSpeed;
    if (speed < -maxSpeed) speed = -maxSpeed;
    
    // Nueva lógica de detención o auto-avance
    if (!isTouching) {
      if (currentMode === 'avion') {
        // El avión no puede detenerse: propulsión automática hacia adelante
        if (speed < mediumSpeed) speed += 0.2;
      } else if (Math.abs(speed) < 0.2) {
        speed = 0; // Los demás vehículos se detienen
      }
    }

    // Progresión 10 veces más lenta que antes (0.005 vs 0.05) para un juego más largo
    progress += speed * 0.005; 
    if (progress < 0) progress = 0; 
    
    // --- CÁLCULO DE TERRENO ACTUAL ---
    let playerWorldX = (progress / 100) * TRACK_LENGTH;
    let currentTerrainH = getTerrainHeight(playerWorldX);
    let dynamicBaseY_px = baseY_px + currentTerrainH;

    // --- INTERACCIÓN CON CHARCOS ---
    if ((currentMode === 'coche' || currentMode === 'tren') && Math.abs(yPos - dynamicBaseY_px) < 15) {
      puddlesData.forEach((px, i) => {
        if (!puddlesHit.includes(i) && Math.abs(playerWorldX - px) < 70) {
          puddlesHit.push(i);
          speed *= 0.65; // Salpicar el agua te frena un poco
          // Partículas de salpicadura de agua
          for(let j=0; j<8; j++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = '#4FC3F7';
            p.style.width = p.style.height = (8 + Math.random()*8) + 'px';
            p.style.left = (window.innerWidth / 2 + (Math.random()*60 - 30)) + 'px';
            p.style.bottom = (dynamicBaseY_px + Math.random()*30) + 'px';
            document.getElementById('game-screen').appendChild(p);
            setTimeout(() => p.remove(), 1000);
          }
        }
      });
    }
    
    // --- MOTOR DE GRAVEDAD Y FÍSICA VERTICAL ---
    yPos += ySpeed;

    if (currentMode === 'coche') {
      let currentGravity = isTouching ? gravity * 0.15 : gravity; // Flota si se sostiene en el aire
      ySpeed -= currentGravity;
      if (yPos <= dynamicBaseY_px) {
        yPos = dynamicBaseY_px;
        if (ySpeed < -3) ySpeed = Math.abs(ySpeed) * 0.3; // Bote contra el piso
        else ySpeed = 0;
      }
    } else if (currentMode === 'tren') {
      yPos = dynamicBaseY_px; // Tren 100% pegado a sus rieles
      ySpeed = 0;
    } else if (currentMode === 'barco') {
      if (yPos > baseY_px) {
        // En el aire (brincando)
        let currentGravity = isTouching ? gravity * 0.2 : gravity;
        ySpeed -= currentGravity;
      } else if (yPos < baseY_px) {
        // Sumergido debajo del agua
        let buoyancy = isTouching ? gravity * 0.1 : gravity * 0.5;
        ySpeed += buoyancy; // El agua lo empuja a flotar
        ySpeed *= 0.92; // Fricción del agua
      } else {
        ySpeed *= 0.8; // Fricción suave en la superficie
      }
      // Opacidad para hacer el efecto de inmersión más realista
      document.getElementById('player').style.opacity = yPos < baseY_px - 10 ? '0.7' : '1';
    } else if (currentMode === 'avion') {
      let runwayY_px = (20 / 100) * window.innerHeight;
      let cruiseY_px = baseY_px;
      const transitionDist = 2000; // 2000px es la longitud de las pistas

      if (playerWorldX < transitionDist) {
        // ANIMACIÓN DE DESPEGUE AUTOMÁTICO
        let p = playerWorldX / transitionDist; // Porcentaje de 0 a 1
        let ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // Suavizado
        yPos = runwayY_px + (cruiseY_px - runwayY_px) * ease;
        ySpeed = 0;
        if (speed < mediumSpeed) speed += 0.2; // Acelera por la pista
      } else if (playerWorldX > TRACK_LENGTH - transitionDist) {
        // ANIMACIÓN DE ATERRIZAJE AUTOMÁTICO
        let p = (playerWorldX - (TRACK_LENGTH - transitionDist)) / transitionDist;
        let ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        yPos = cruiseY_px - (cruiseY_px - runwayY_px) * ease;
        ySpeed = 0;
        if (speed < mediumSpeed) speed += 0.2; // Fuerza velocidad para asegurar llegada a la meta
      } else {
        // Vuelo estable guiado por el jugador
        ySpeed *= 0.92; // Resistencia aerodinámica frena el impulso vertical suavemente
        if (yPos < baseY_px * 0.3) {
          yPos = baseY_px * 0.3; // Altura mínima de vuelo
          if (ySpeed < 0) ySpeed = 0;
        }
      }
    }

    // Límite superior (techo) de la pantalla para TODOS los transportes
    const maxVisibleHeight = window.innerHeight - 100; // 100px es el tamaño del jugador
    if (yPos > maxVisibleHeight) {
      yPos = maxVisibleHeight;
      if (ySpeed > 0) ySpeed = 0; // Detiene el ascenso brusco al tocar el techo
    }

    // Limitar velocidad vertical extrema
    if (ySpeed > 25) ySpeed = 25;
    if (ySpeed < -25) ySpeed = -25;

    // Inclinación del transporte basada en la pendiente del terreno
    let rotationAngle = 0;
    if (currentMode === 'coche' || currentMode === 'tren') {
      const th1 = currentTerrainH;
      const th2 = getTerrainHeight(playerWorldX + 20); // Mirar un poco adelante
      rotationAngle = Math.atan2(th2 - th1, 20) * (180 / Math.PI);
    } else if (currentMode === 'avion') {
      const tDist = 2000;
      if (playerWorldX < tDist) {
        let p = playerWorldX / tDist;
        rotationAngle = 15 * Math.sin(p * Math.PI); // Levanta la trompa al despegar
      } else if (playerWorldX > TRACK_LENGTH - tDist) {
        let p = (playerWorldX - (TRACK_LENGTH - tDist)) / tDist;
        rotationAngle = -10 * Math.sin(p * Math.PI); // Baja levemente la trompa (flare de aterrizaje)
      } else {
        rotationAngle = ySpeed * 1.5; // Inclinación dinámica al deslizar arriba/abajo en pleno vuelo
      }
    }

    // Volteo visual e inclinación del jugador
    const player = document.getElementById('player');
    const facing = speed < -0.5 ? -1 : (speed > 0.5 ? 1 : player.style.getPropertyValue('--facing') || 1);
    player.style.setProperty('--facing', facing);
    
    // Aplicar Posición, Inclinación y Dirección
    player.style.bottom = yPos + 'px';
    player.style.transform = `translateX(-50%) rotate(${-rotationAngle}deg) scaleX(var(--facing))`;
    // -------------------------------------------

    if (progress >= 100) {
      progress = 100;
      winGame();
    }
    
    document.getElementById('progress-fill').style.width = progress + '%';

    // Movimiento visual de la pista (calculado en base al progreso real y longitud)
    const trackX = screenCenter - (progress / 100) * TRACK_LENGTH;
    document.getElementById('track').style.transform = `translateX(${trackX}px)`;

    // Movimiento infinito del piso de fondo
    distanceScrolled += speed * 2;
    const bgPos = ((distanceScrolled % window.innerWidth) + window.innerWidth) % window.innerWidth;
    document.getElementById('scenery').style.transform = `translateX(-${bgPos}px)`;

    // Partículas de alta velocidad
    if (Math.abs(speed) > mediumSpeed * 1.5 && Math.random() > 0.6) {
      spawnParticle(Math.sign(speed));
    }

    gameLoopReq = requestAnimationFrame(gameLoop);
  }

  function winGame() {
    isRunning = false;
    const timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById('time-display').innerText = timeTaken;
    
    setTimeout(() => {
      document.getElementById('game-screen').classList.remove('active');
      document.getElementById('win-screen').classList.add('active');
    }, 500);
  }

</script>
