<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- =========================================================================
     1. CONFIGURACIÓN DEL NAVEGADOR
     ========================================================================= -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mini Trips">
<meta name="theme-color" content="#87CEEB">

<title>Mini Trips!</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  /* =========================================================================
     2. VARIABLES DE DISEÑO
     ========================================================================= */
  :root {
    --sky-top: #87CEEB;
    --sky-bottom: #B8E4F9;
    --ground: #6BBF4E;
    --ground-dark: #4E9B35;
    --water: #3A9FD8;
    --water-dark: #2278A8;
    --dirt: #A0522D;
    --dirt-dark: #8B4513;
    --sand: #F5D77A;
    --cloud: #FFFFFF;
    --sun: #FFD93D;
    --ui-bg: #FFF8EC;
    --ui-shadow: rgba(0,0,0,0.18);
    --btn-green: #5DD15A;
    --btn-green-dark: #3FAD3C;
    --btn-orange: #FF8A3D;
    --btn-orange-dark: #E06820;
    --btn-blue: #4FC3F7;
    --btn-blue-dark: #29B6F6;
  }

  /* =========================================================================
     3. RESETEO Y ESTILOS BASE
     ========================================================================= */
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background-color: var(--sky-top);
    touch-action: none;
  }

  h1, h2, h3 {
    font-family: 'Fredoka One', cursive;
    margin: 0;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
  }

  /* =========================================================================
     4. GESTOR DE PANTALLAS
     ========================================================================= */
  .screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: env(safe-area-inset-top, 47px);
    padding-bottom: env(safe-area-inset-bottom, 34px);
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    z-index: 10;
  }

  .screen.active {
    display: flex;
  }

  /* --- INICIO --- */
  #home-screen {
    justify-content: center;
    gap: clamp(10px, 4vh, 30px);
    background: var(--ui-bg);
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    flex-direction: column !important;
  }
  
  .title-card {
    background: white;
    padding: clamp(10px, 2vh, 20px) clamp(20px, 6vw, 40px);
    border-radius: clamp(15px, 4vh, 30px);
    box-shadow: 0 10px 20px var(--ui-shadow);
    text-align: center;
    border: 4px solid var(--sky-bottom);
    margin: 0;
  }

  .title-card h1 {
    font-size: clamp(1.8rem, 6vmin, 3.5rem);
    color: var(--btn-orange);
    white-space: nowrap;
    margin: 0;
  }

  .mode-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(8px, 2vw, 20px);
    justify-content: center;
    width: 100%;
    max-width: 500px;
  }

  .mode-btn {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 110px;
    max-height: 110px;
    border-radius: clamp(12px, 4vmin, 25px);
    border: none;
    background-color: white;
    background-size: 60%;
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 6px 0 var(--sky-bottom);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }

  .mode-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 var(--sky-bottom);
    border: 3px solid var(--btn-orange);
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #home-screen {
      gap: 15px;
      padding-top: env(safe-area-inset-top, 10px);
      padding-bottom: env(safe-area-inset-bottom, 10px);
    }
    .mode-selector { max-width: 450px; }
    .mode-btn { box-shadow: 0 4px 0 var(--sky-bottom); }
    .mode-btn:active { transform: translateY(4px); }
  }

  /* --- JUEGO --- */
  #game-screen {
    justify-content: space-between;
    overflow: hidden;
  }

  .game-header {
    width: 90%;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 50;
  }

  .back-btn {
    background: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    order: 2;
  }
  .back-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }

  .progress-bar {
    flex-grow: 1;
    height: 25px;
    background: rgba(255,255,255,0.5);
    border-radius: 12.5px;
    border: 3px solid white;
    overflow: hidden;
    position: relative;
    order: 1;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--btn-orange);
    transition: width 0.1s linear;
  }

  .environment {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50%;
    background: var(--ground);
    border-top: 10px solid var(--ground-dark);
    z-index: 1;
    transition: background 0.3s, border-color 0.3s;
  }

  .scenery {
    position: absolute;
    width: 200%;
    height: 100%;
    bottom: 0;
    left: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.05) 10%, transparent 10%);
    background-size: 40px 40px;
    z-index: 2;
  }

  #track {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 15;
  }

  /* SVG dinámico para las olas del barco */
  #dynamic-water {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 8;
    display: none; /* Se activa solo en el modo Barco */
  }

  .start-line, .finish-line {
    position: absolute;
    width: 20px;
    height: 140px;
    background: repeating-linear-gradient(0deg, #fff, #fff 15px, #000 15px, #000 30px);
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    box-shadow: 3px 0 10px rgba(0,0,0,0.2);
    border-radius: 5px 5px 0 0;
  }
  
  .start-line::after {
    content: 'INICIO';
    position: absolute;
    bottom: 150px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-green);
  }

  .finish-line::after {
    content: 'META';
    position: absolute;
    bottom: 150px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-orange);
  }

  .finish-line::before {
    content: '🏁';
    position: absolute;
    bottom: 190px;
    font-size: 4rem;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3));
  }

  .track-marker {
    position: absolute;
    background: var(--btn-blue);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    border: 4px solid white;
    box-shadow: 0 4px 0 var(--btn-blue-dark), 0 6px 10px rgba(0,0,0,0.2);
    transform: translateX(-50%);
  }

  .track-marker::after {
    content: '';
    position: absolute;
    top: 100%;
    width: 8px;
    height: 35px;
    background: #D7CCC8;
    border: 2px solid #8D6E63;
    border-top: none;
    z-index: -1;
    border-radius: 0 0 4px 4px;
  }

  .track-decor {
    position: absolute;
    font-size: 3.5rem;
    transform: translateX(-50%);
    filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
  }

  #player {
    position: absolute;
    bottom: 20%;
    left: 50%;
    --facing: 1;
    transform: translateX(-50%) scaleX(var(--facing));
    font-size: 5rem;
    z-index: 30;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  .instructions {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-weight: 900;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 40;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    transition: opacity 0.3s;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 25;
    pointer-events: none;
    opacity: 1;
    animation: fadeOutUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes fadeOutUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100px) scale(0); opacity: 0; }
  }

  .puddle {
    position: absolute;
    background: rgba(58, 159, 216, 0.7);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    width: 140px;
    height: 35px;
    transform: translateX(-50%);
    z-index: 10;
  }

  /* --- VICTORIA --- */
  #win-screen {
    justify-content: center;
    background: var(--btn-green);
    color: white;
  }
  
  #win-screen h1 {
    font-size: 4rem;
    margin-bottom: 30px;
  }

  .trophy {
    font-size: 6rem;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 10px;
  }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }
  
  .play-btn {
    background: var(--btn-green);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    padding: 15px 50px;
    border: none;
    border-radius: 30px;
    box-shadow: 0 8px 0 var(--btn-green-dark);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .play-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--btn-green-dark);
  }

</style>
</head>
<body>

  <!-- PANTALLA INICIO -->
  <div id="home-screen" class="screen active">
    <div class="title-card">
      <h1>Mini Trips!</h1>
    </div>
    <div class="mode-selector">
      <button class="mode-btn" data-mode="coche" onpointerdown="selectMode('coche')" style="background-image: url('sprites/coche.png');"></button>
      <button class="mode-btn" data-mode="tren" onpointerdown="selectMode('tren')" style="background-image: url('sprites/tren.png');"></button>
      <button class="mode-btn" data-mode="barco" onpointerdown="selectMode('barco')" style="background-image: url('sprites/barco.png');"></button>
      <button class="mode-btn" data-mode="avion" onpointerdown="selectMode('avion')" style="background-image: url('sprites/avion.png');"></button>
    </div>
  </div>

  <!-- PANTALLA JUEGO -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="back-btn" id="back-btn">⬅️</button>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="environment" id="environment">
      <div class="scenery" id="scenery"></div>
    </div>

    <!-- Olas orgánicas generadas proceduralmente (solo visibles en Barco) -->
    <svg id="dynamic-water">
      <!-- Capa trasera oscura para dar sensación de profundidad (Parallax) -->
      <path id="water-path-bg" fill="var(--water-dark)" opacity="0.8" />
      <!-- Capa frontal clara -->
      <path id="water-path" fill="var(--water)" opacity="0.95" />
    </svg>

    <div id="track"></div>
    <div id="player">🚗</div>

    <div class="instructions" id="game-hints">
      Toca los lados para avanzar.<br>¡Desliza rápido para acelerar!
    </div>
  </div>

  <!-- PANTALLA VICTORIA (Sin Cronómetro) -->
  <div id="win-screen" class="screen">
    <div class="trophy">🏆</div>
    <h1>¡LLEGASTE!</h1>
    <button class="play-btn" style="background: var(--btn-orange); box-shadow: 0 8px 0 var(--btn-orange-dark);" onpointerdown="goHome()">Volver al Menú</button>
  </div>

<script>
  // --- VARIABLES GLOBALES ---
  let currentMode = 'coche';
  let isRunning = false;
  let progress = 0;
  let speed = 0;
  let maxSpeed = 25;
  let mediumSpeed = 4;
  let distanceScrolled = 0;
  let gameLoopReq;

  // Touch
  let isTouching = false;
  let touchX = 0, lastTouchX = 0;
  let touchY = 0, lastTouchY = 0;
  let lastTouchTime = 0;

  // Física
  let yPos = 0;
  let ySpeed = 0;
  let baseY_px = 0;
  let dynamicBaseY_px = 0; 
  let gravity = 0.6;
  let rotationAngle = 0;

  // Terreno
  let terrainSeeds = null;
  let puddlesData = [];
  let puddlesHit = [];
  const TRACK_LENGTH = 20000; 

  // Configuración de Vehículos
  const config = {
    coche: { 
      emoji: '🚗', envColor: 'var(--ground)', borderColor: 'var(--ground-dark)', bottomPos: '25%',
      particleColors: ['#FFD93D', '#FFFFFF', '#AAAAAA'],
      decor: ['🌲', '🌳', '🪨', '🍄', '🌻', '🛑', '🪵']
    },
    tren: { 
      emoji: '🚂', envColor: 'var(--dirt)', borderColor: 'var(--dirt-dark)', bottomPos: '25%',
      particleColors: ['#555555', '#333333', '#888888', '#FFD93D'],
      decor: ['🌵', '🛖', '⛰️', '🐄', '🤠', '🛤️', '🪨']
    },
    barco: { 
      emoji: '⛵', envColor: 'transparent', borderColor: 'transparent', bottomPos: '35%',
      particleColors: ['#FFFFFF', '#B8E4F9', '#4FC3F7'],
      decor: ['☁️', '🏝️', '🛟', '🐟', '⛵', '🐙', '⚓'] // Cambié olas por nubes en la decoración ya que el mar será animado
    },
    avion: { 
      emoji: '✈️', envColor: 'transparent', borderColor: 'transparent', bottomPos: '60%',
      particleColors: ['#FFFFFF', '#FFFFFF', '#B8E4F9'],
      decor: ['☁️', '🦅', '🎈', '⛅', '✨', '🛸', '🚁']
    }
  };

  function getTerrainHeight(x) {
    if (currentMode !== 'coche' && currentMode !== 'tren') return 0;
    if (!terrainSeeds) return 0;
    
    let fade = 1;
    if (x < 1500) fade = x / 1500;
    else if (x > TRACK_LENGTH - 1500) fade = (TRACK_LENGTH - x) / 1500;
    
    const h1 = Math.sin(x / terrainSeeds.f1) * terrainSeeds.a1;
    const h2 = Math.cos(x / terrainSeeds.f2) * terrainSeeds.a2;
    const h3 = Math.sin(x / terrainSeeds.f3) * terrainSeeds.a3;
    
    return (h1 + h2 + h3) * fade;
  }

  function selectMode(mode) {
    currentMode = mode;
    startGame();
  }

  function goHome() {
    isRunning = false;
    cancelAnimationFrame(gameLoopReq);
    document.getElementById('win-screen').classList.remove('active');
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('active');
  }

  document.getElementById('back-btn').addEventListener('pointerdown', goHome);

  function generateTrack() {
    const track = document.getElementById('track');
    track.innerHTML = '';
    const cfg = config[currentMode];
    
    baseY_px = (parseFloat(cfg.bottomPos) / 100) * window.innerHeight;
    const svgHeight = 2000; 

    // Ocultar entorno visual predeterminado si es barco, para usar las olas SVG
    const env = document.getElementById('environment');
    if (currentMode === 'barco') {
      env.style.background = 'transparent';
      env.style.borderTopColor = 'transparent';
      document.getElementById('dynamic-water').style.display = 'block';
    } else {
      env.style.background = cfg.envColor;
      env.style.borderTopColor = cfg.borderColor;
      document.getElementById('dynamic-water').style.display = 'none';
    }

    if (currentMode === 'coche' || currentMode === 'tren') {
      let svgHTML = `<svg id="terrain-svg" width="${TRACK_LENGTH}" height="${svgHeight}" style="position:absolute; bottom:0; left:0; overflow:visible; z-index: 5;">`;
      let pathData = `M 0,${svgHeight - baseY_px} `;
      
      // Interpolación más fina (cada 50px) para un suelo más suave
      for (let x = 0; x <= TRACK_LENGTH; x += 50) {
          pathData += `L ${x},${svgHeight - (baseY_px + getTerrainHeight(x))} `;
      }

      if (currentMode === 'coche') {
          svgHTML += `<path d="${pathData}" fill="none" stroke="var(--ground-dark)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 5)"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#606060" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="20, 30" stroke-linecap="round" stroke-linejoin="round"/>`;
      } else {
          svgHTML += `<path d="${pathData}" fill="none" stroke="#5D4037" stroke-width="35" stroke-dasharray="8, 24" stroke-linecap="round" stroke-linejoin="round"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -12)"/>`;
          svgHTML += `<path d="${pathData}" fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 12)"/>`;
      }
      svgHTML += `</svg>`;
      track.insertAdjacentHTML('beforeend', svgHTML);
      
    } else if (currentMode === 'avion') {
      // TERRENO ORGÁNICO PARA EL AVIÓN:
      // Usamos Curvas Bézier (C) para crear acantilados naturales en lugar de rectángulos.
      let runwayY_px = (20 / 100) * window.innerHeight; 
      let svgHTML = `<svg id="terrain-svg" width="${TRACK_LENGTH + 4000}" height="${svgHeight}" style="position:absolute; bottom:0; left:-2000px; overflow:visible; z-index: 5;">`;

      // --- Isla de Despegue ---
      // M: Mover a, L: Línea recta, C: Curva Bézier Cúbica, Z: Cerrar polígono
      let startIsland = `M 0,${svgHeight} 
                         L 0,${svgHeight - runwayY_px} 
                         L 3000,${svgHeight - runwayY_px} 
                         C 3500,${svgHeight - runwayY_px} 3800,${svgHeight} 4200,${svgHeight} 
                         Z`;
      
      // --- Isla de Aterrizaje ---
      let endX = TRACK_LENGTH + 2000; 
      let endIsland = `M ${endX},${svgHeight} 
                       C ${endX - 400},${svgHeight} ${endX - 800},${svgHeight - runwayY_px} ${endX - 1200},${svgHeight - runwayY_px} 
                       L ${endX + 2000},${svgHeight - runwayY_px} 
                       L ${endX + 2000},${svgHeight} 
                       Z`;

      // Dibujar Islas
      svgHTML += `<path d="${startIsland}" fill="#6BBF4E" />`;
      svgHTML += `<path d="${endIsland}" fill="#6BBF4E" />`;
      
      // Dibujar borde de tierra debajo del pasto usando el mismo trazo de la curva
      let startDirt = `M 0,${svgHeight - runwayY_px} L 3000,${svgHeight - runwayY_px} C 3500,${svgHeight - runwayY_px} 3800,${svgHeight} 4200,${svgHeight}`;
      let endDirt = `M ${endX},${svgHeight} C ${endX - 400},${svgHeight} ${endX - 800},${svgHeight - runwayY_px} ${endX - 1200},${svgHeight - runwayY_px} L ${endX + 2000},${svgHeight - runwayY_px}`;
      
      svgHTML += `<path d="${startDirt}" fill="none" stroke="#8B4513" stroke-width="25" />`;
      svgHTML += `<path d="${endDirt}" fill="none" stroke="#8B4513" stroke-width="25" />`;

      // Pistas de asfalto gris (líneas rectas sobre las islas planas)
      svgHTML += `<line x1="0" y1="${svgHeight - runwayY_px - 5}" x2="2800" y2="${svgHeight - runwayY_px - 5}" stroke="#555555" stroke-width="20" stroke-linecap="round"/>`;
      svgHTML += `<line x1="${endX - 1000}" y1="${svgHeight - runwayY_px - 5}" x2="${endX + 2000}" y2="${svgHeight - runwayY_px - 5}" stroke="#555555" stroke-width="20" stroke-linecap="round"/>`;

      svgHTML += `</svg>`;
      track.insertAdjacentHTML('beforeend', svgHTML);
    }

    // Charcos de agua para vehículos terrestres
    puddlesData = [];
    puddlesHit = [];
    if (currentMode === 'coche' || currentMode === 'tren') {
        for (let px = 2000; px < TRACK_LENGTH - 2000; px += 400 + Math.random() * 800) {
            if (Math.random() > 0.5) {
                puddlesData.push(px);
                const th = getTerrainHeight(px);
                const puddle = document.createElement('div');
                puddle.className = 'puddle';
                puddle.style.left = px + 'px';
                puddle.style.bottom = (baseY_px + th - 15) + 'px';
                track.appendChild(puddle);
            }
        }
    }

    let lineBottomPos = cfg.bottomPos;
    if (currentMode === 'avion') lineBottomPos = '20%';

    const start = document.createElement('div');
    start.className = 'start-line';
    start.style.left = '0px';
    start.style.bottom = lineBottomPos;
    track.appendChild(start);

    const finish = document.createElement('div');
    finish.className = 'finish-line';
    finish.style.left = TRACK_LENGTH + 'px';
    finish.style.bottom = lineBottomPos;
    track.appendChild(finish);

    for (let i = 1; i <= 10; i++) {
        const marker = document.createElement('div');
        marker.className = 'track-marker';
        marker.innerText = (11 - i); 
        const markerX = TRACK_LENGTH * ((i * (100 / 11)) / 100);
        marker.style.left = markerX + 'px';
        marker.style.bottom = (baseY_px + getTerrainHeight(markerX) + 35) + 'px';
        track.appendChild(marker);
    }

    const items = cfg.decor;
    for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'track-decor';
        el.innerText = items[Math.floor(Math.random() * items.length)];
        const pos = 600 + Math.random() * (TRACK_LENGTH - 1200);
        el.style.left = pos + 'px';
        
        let vOffset = (Math.random() - 0.5) * 60; 
        if (currentMode === 'avion' || currentMode === 'barco') vOffset = (Math.random() - 0.2) * 200; 
        
        el.style.bottom = (baseY_px + getTerrainHeight(pos) + vOffset) + 'px';
        el.style.transform = `translateX(-50%) scale(${0.6 + Math.random() * 1.2})`;
        el.style.zIndex = Math.random() > 0.5 ? 20 : 35;
        track.appendChild(el);
    }
  }

  function startGame() {
    const player = document.getElementById('player');
    const cfg = config[currentMode];

    player.style.bottom = cfg.bottomPos;
    player.style.setProperty('--facing', '1');
    player.innerHTML = '';
    player.style.backgroundImage = `url('sprites/${currentMode}.png')`;

    terrainSeeds = {
      a1: 30 + Math.random() * 50, f1: 500 + Math.random() * 500,
      a2: 20 + Math.random() * 30, f2: 250 + Math.random() * 200,
      a3: 10 + Math.random() * 20, f3: 100 + Math.random() * 100
    };

    baseY_px = (parseFloat(cfg.bottomPos) / 100) * window.innerHeight;
    yPos = (currentMode === 'avion') ? (20 / 100) * window.innerHeight : baseY_px;
    ySpeed = 0;
    
    player.style.bottom = yPos + 'px';
    player.style.opacity = '1';

    generateTrack();

    progress = 0; speed = 0; distanceScrolled = 0; isTouching = false;
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('game-hints').style.opacity = '1';
    isRunning = true;

    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');

    gameLoop();
  }

  // --- CONTROLES TÁCTILES ---
  const gameScreen = document.getElementById('game-screen');
  gameScreen.addEventListener('pointerdown', (e) => {
    if (!isRunning || e.target.id === 'back-btn') return;
    isTouching = true;
    touchX = e.clientX; lastTouchX = e.clientX;
    touchY = e.clientY; lastTouchY = e.clientY;
    lastTouchTime = Date.now();
    document.getElementById('game-hints').style.opacity = '0';
  });

  gameScreen.addEventListener('pointermove', (e) => {
    if (!isRunning || !isTouching) return;
    const now = Date.now();
    const dt = now - lastTouchTime;
    touchX = e.clientX; touchY = e.clientY;
    
    if (dt > 0) {
      const swipeVelocityX = (touchX - lastTouchX) / dt;
      speed += swipeVelocityX * 6;
      const swipeVelocityY = (lastTouchY - touchY) / dt;
      if (currentMode !== 'tren') {
        let clampedY = Math.max(-15, Math.min(15, swipeVelocityY));
        ySpeed += clampedY * 1.5;
      }
    }
    lastTouchX = touchX; lastTouchY = touchY; lastTouchTime = now;
  });

  const endTouch = () => { isTouching = false; };
  gameScreen.addEventListener('pointerup', endTouch);
  gameScreen.addEventListener('pointercancel', endTouch);
  gameScreen.addEventListener('pointerleave', endTouch);

  function spawnParticle(direction) {
    const cfg = config[currentMode];
    const c = cfg ? cfg.particleColors : ['#FFD93D'];
    const p = document.createElement('div');
    const playerRect = document.getElementById('player').getBoundingClientRect();
    
    p.className = 'particle';
    p.style.background = c[Math.floor(Math.random() * c.length)];
    p.style.width = p.style.height = (8 + Math.random() * 6) + 'px';
    
    const offset = direction > 0 ? -25 : 25;
    const leftOffset = playerRect.left + (playerRect.width / 2) + offset + (Math.random() * 20 - 10);
    const bottomOffset = window.innerHeight - playerRect.bottom + (Math.random() * 20);
    
    p.style.left = leftOffset + 'px';
    p.style.bottom = bottomOffset + 'px';
    
    document.getElementById('game-screen').appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }

  // --- BUCLE PRINCIPAL (GAME LOOP) ---
  function gameLoop() {
    if (!isRunning) return;

    let targetSpeed = 0;
    const screenCenter = window.innerWidth / 2;

    if (isTouching) {
      targetSpeed = (touchX > screenCenter) ? mediumSpeed : -mediumSpeed;
      if (targetSpeed > 0 && speed < targetSpeed) speed += 0.5;
      if (targetSpeed < 0 && speed > targetSpeed) speed -= 0.5;
    }

    speed *= 0.93; 
    if (speed > maxSpeed) speed = maxSpeed;
    if (speed < -maxSpeed) speed = -maxSpeed;
    
    if (!isTouching) {
      if (currentMode === 'avion') {
        if (speed < mediumSpeed) speed += 0.2;
      } else if (Math.abs(speed) < 0.2) {
        speed = 0;
      }
    }

    progress += speed * 0.005; 
    if (progress < 0) progress = 0; 
    
    let playerWorldX = (progress / 100) * TRACK_LENGTH;
    
    // --- LÓGICA DE AGUA FLUIDA Y OLAS (MODO BARCO) ---
    if (currentMode === 'barco') {
      let time = Date.now();
      let waveTime = time * 0.002;
      let waveTimeBg = time * 0.0015;

      // Cálculo de la altura de la ola bajo el barco usando dos senos cruzados
      let waveH = Math.sin(playerWorldX * 0.015 + waveTime) * 15 + 
                  Math.sin(playerWorldX * 0.008 + waveTime * 1.5) * 10;
      
      dynamicBaseY_px = baseY_px + waveH;

      // DIBUJAR LAS OLAS FLUIDAS EN PANTALLA
      let pathFg = `M -100, ${window.innerHeight} `;
      let pathBg = `M -100, ${window.innerHeight} `;

      // Escanea la pantalla dibujando el polígono del agua
      for(let px = -50; px <= window.innerWidth + 50; px += 50) {
        let wX = (progress / 100) * TRACK_LENGTH + (px - window.innerWidth/2);

        // Ola Frontal (la que golpea al barco)
        let fgH = Math.sin(wX * 0.015 + waveTime) * 15 + Math.sin(wX * 0.008 + waveTime * 1.5) * 10;
        let fgY = window.innerHeight - (baseY_px + fgH);
        pathFg += `L ${px}, ${fgY} `;

        // Ola Trasera (Efecto parallax, más alta y con movimiento ligeramente distinto)
        let bgH = Math.sin(wX * 0.012 + waveTimeBg + 10) * 12 + Math.sin(wX * 0.005 + waveTimeBg * 1.2) * 15;
        let bgY = window.innerHeight - (baseY_px + bgH + 15);
        pathBg += `L ${px}, ${bgY} `;
      }

      pathFg += `L ${window.innerWidth + 100}, ${window.innerHeight} Z`;
      pathBg += `L ${window.innerWidth + 100}, ${window.innerHeight} Z`;

      document.getElementById('water-path').setAttribute('d', pathFg);
      document.getElementById('water-path-bg').setAttribute('d', pathBg);

      // Calcular ángulo de inclinación del barco calculando la derivada de las olas
      let waveDeriv = Math.cos(playerWorldX * 0.015 + waveTime) * 15 * 0.015 +
                      Math.cos(playerWorldX * 0.008 + waveTime * 1.5) * 10 * 0.008;
      rotationAngle = waveDeriv * (180 / Math.PI) * 1.5;

    } else {
      dynamicBaseY_px = baseY_px + getTerrainHeight(playerWorldX);
    }

    // --- FÍSICA VERTICAL ---
    yPos += ySpeed;

    if (currentMode === 'coche') {
      let currentGravity = isTouching ? gravity * 0.15 : gravity;
      ySpeed -= currentGravity;
      if (yPos <= dynamicBaseY_px) {
        yPos = dynamicBaseY_px;
        ySpeed = ySpeed < -3 ? Math.abs(ySpeed) * 0.3 : 0;
      }
    } else if (currentMode === 'tren') {
      yPos = dynamicBaseY_px;
      ySpeed = 0;
    } else if (currentMode === 'barco') {
      // Mecanismo de flotabilidad rápida
      if (yPos > dynamicBaseY_px) {
        let currentGravity = isTouching ? gravity * 0.2 : gravity;
        ySpeed -= currentGravity; 
      } else if (yPos < dynamicBaseY_px) {
        // Al sumergirse se empuja con mucha más fuerza hacia arriba para no estar hundido
        let buoyancy = isTouching ? gravity * 0.8 : gravity * 1.8; 
        ySpeed += buoyancy; 
        ySpeed *= 0.85; // Menor fricción bajo el agua permite salir más ágil
      } else {
        ySpeed *= 0.8;
      }
      document.getElementById('player').style.opacity = yPos < dynamicBaseY_px - 5 ? '0.7' : '1';
    
    } else if (currentMode === 'avion') {
      let runwayY_px = (20 / 100) * window.innerHeight;
      let cruiseY_px = baseY_px;
      const tDist = 2000;

      if (playerWorldX < tDist) {
        let p = playerWorldX / tDist;
        yPos = runwayY_px + (cruiseY_px - runwayY_px) * (p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
        ySpeed = 0;
        if (speed < mediumSpeed) speed += 0.2;
      } else if (playerWorldX > TRACK_LENGTH - tDist) {
        let p = (playerWorldX - (TRACK_LENGTH - tDist)) / tDist;
        yPos = cruiseY_px - (cruiseY_px - runwayY_px) * (p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
        ySpeed = 0;
        if (speed < mediumSpeed) speed += 0.2; 
      } else {
        ySpeed *= 0.92;
        if (yPos < baseY_px * 0.3) {
          yPos = baseY_px * 0.3;
          if (ySpeed < 0) ySpeed = 0;
        }
      }
    }

    const maxVisibleHeight = window.innerHeight - 100;
    if (yPos > maxVisibleHeight) {
      yPos = maxVisibleHeight;
      if (ySpeed > 0) ySpeed = 0;
    }
    if (ySpeed > 25) ySpeed = 25;
    if (ySpeed < -25) ySpeed = -25;

    // --- INCLINACIÓN VISUAL (EXCEPTO BARCO QUE SE CALCULA ARRIBA) ---
    if (currentMode === 'coche' || currentMode === 'tren') {
      const th1 = getTerrainHeight(playerWorldX);
      const th2 = getTerrainHeight(playerWorldX + 20); 
      rotationAngle = Math.atan2(th2 - th1, 20) * (180 / Math.PI);
    } else if (currentMode === 'avion') {
      const tDist = 2000;
      if (playerWorldX < tDist) {
        rotationAngle = 15 * Math.sin((playerWorldX / tDist) * Math.PI);
      } else if (playerWorldX > TRACK_LENGTH - tDist) {
        rotationAngle = -10 * Math.sin(((playerWorldX - (TRACK_LENGTH - tDist)) / tDist) * Math.PI);
      } else {
        rotationAngle = ySpeed * 1.5;
      }
    }

    // --- RENDERIZADO VISUAL ---
    const player = document.getElementById('player');
    const facing = speed < -0.5 ? -1 : (speed > 0.5 ? 1 : player.style.getPropertyValue('--facing') || 1);
    player.style.setProperty('--facing', facing);
    
    player.style.bottom = yPos + 'px';
    player.style.transform = `translateX(-50%) rotate(${-rotationAngle}deg) scaleX(var(--facing))`;
    
    if (progress >= 100) {
      progress = 100;
      winGame();
    }
    
    document.getElementById('progress-fill').style.width = progress + '%';
    const trackX = screenCenter - (progress / 100) * TRACK_LENGTH;
    document.getElementById('track').style.transform = `translateX(${trackX}px)`;

    distanceScrolled += speed * 2;
    const bgPos = ((distanceScrolled % window.innerWidth) + window.innerWidth) % window.innerWidth;
    document.getElementById('scenery').style.transform = `translateX(-${bgPos}px)`;

    if (Math.abs(speed) > mediumSpeed * 1.5 && Math.random() > 0.6) {
      spawnParticle(Math.sign(speed));
    }

    gameLoopReq = requestAnimationFrame(gameLoop);
  }

  function winGame() {
    isRunning = false;
    setTimeout(() => {
      document.getElementById('game-screen').classList.remove('active');
      document.getElementById('win-screen').classList.add('active');
    }, 500);
  }

</script>
