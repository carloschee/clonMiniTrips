<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Trips!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --sky-top: #87CEEB;
    --sky-bottom: #B8E4F9;
    --ground: #6BBF4E;
    --ground-dark: #4E9B35;
    --water: #3A9FD8;
    --water-dark: #2278A8;
    --sand: #F5D77A;
    --cloud: #FFFFFF;
    --sun: #FFD93D;
    --star: #FFE566;
    --ui-bg: #FFF8EC;
    --ui-shadow: rgba(0,0,0,0.18);
    --btn-green: #5DD15A;
    --btn-green-dark: #3FAD3C;
    --btn-orange: #FF8A3D;
    --btn-orange-dark: #E06820;
    --btn-blue: #4FC3F7;
    --btn-blue-dark: #0288D1;
    --text-dark: #2C2C54;
    --marker-color: #FF5252;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }

  #app {
    width: 800px; height: 500px;
    position: relative; overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* ========== SCREENS ========== */
  .screen {
    position: absolute; inset: 0;
    display: none; overflow: hidden;
  }
  .screen.active { display: block; }

  /* ========== HOME SCREEN ========== */
  #home-screen {
    background: linear-gradient(160deg, #FFE066 0%, #FF8A3D 40%, #FF4F8B 100%);
  }

  .home-clouds {
    position: absolute; top: 0; left: 0; width: 200%; height: 100%;
    animation: cloudScroll 30s linear infinite;
  }
  @keyframes cloudScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .home-title {
    position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 52px; color: white;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.15);
    white-space: nowrap; letter-spacing: 2px;
    animation: titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-6px); }
  }

  .home-subtitle {
    position: absolute; top: 94px; left: 50%; transform: translateX(-50%);
    font-size: 16px; color: rgba(255,255,255,0.9); font-weight: 700;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.15); white-space: nowrap; letter-spacing: 1px;
  }

  .vehicles-grid {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; align-items: flex-end;
  }

  .vehicle-card {
    width: 150px; height: 160px; border-radius: 24px;
    background: rgba(255,255,255,0.92);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2), 0 2px 0 rgba(255,255,255,0.5) inset;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .2s, box-shadow .2s;
    border: 3px solid rgba(255,255,255,0.8);
    position: relative; overflow: hidden;
    animation: cardFloat 3s ease-in-out infinite;
  }
  .vehicle-card:nth-child(1) { animation-delay: 0s; }
  .vehicle-card:nth-child(2) { animation-delay: 0.4s; }
  .vehicle-card:nth-child(3) { animation-delay: 0.8s; }
  .vehicle-card:nth-child(4) { animation-delay: 1.2s; }

  @keyframes cardFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  .vehicle-card:hover { transform: translateY(-12px) scale(1.05); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
  .vehicle-card:active { transform: scale(0.96); }

  .vehicle-card .card-emoji {
    font-size: 52px; margin-bottom: 4px;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
    transition: transform .2s;
  }
  .vehicle-card:hover .card-emoji { transform: scale(1.15) rotate(-5deg); }

  .vehicle-card .card-name {
    font-family: 'Fredoka One', cursive;
    font-size: 18px; color: var(--text-dark);
    text-align: center;
  }

  .card-stripe {
    position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
  }
  .plane-card .card-stripe { background: linear-gradient(90deg, #4FC3F7, #0288D1); }
  .train-card .card-stripe { background: linear-gradient(90deg, #FF8A3D, #E06820); }
  .boat-card  .card-stripe { background: linear-gradient(90deg, #4DD0E1, #0097A7); }
  .car-card   .card-stripe { background: linear-gradient(90deg, #5DD15A, #3FAD3C); }

  /* ========== GAME SCREEN ========== */
  #game-screen { background: #87CEEB; }

  /* ---- scrolling world ---- */
  #world {
    position: absolute; inset: 0;
    overflow: hidden;
  }

  #world-canvas {
    position: absolute; top: 0; left: 0;
    image-rendering: pixelated;
  }

  /* ---- vehicle sprite ---- */
  #vehicle-sprite {
    position: absolute; font-size: 56px;
    filter: drop-shadow(4px 6px 8px rgba(0,0,0,0.3));
    transition: top .4s ease;
    z-index: 10;
    transform-origin: center;
  }

  /* ---- HUD ---- */
  #hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; align-items: center; gap: 10px; z-index: 20;
  }

  #back-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.92); border: none; cursor: pointer;
    font-size: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s;
  }
  #back-btn:hover { transform: scale(1.1); }
  #back-btn:active { transform: scale(0.9); }

  #progress-bar-container {
    flex: 1; height: 20px; background: rgba(255,255,255,0.5);
    border-radius: 10px; overflow: visible;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    position: relative;
  }
  #progress-bar {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, #FFD93D, #FF8A3D);
    transition: width .5s ease;
    box-shadow: 0 2px 6px rgba(255,140,0,0.4);
  }

  .milestone-dot {
    position: absolute; top: 50%; width: 14px; height: 14px;
    border-radius: 50%; background: white;
    border: 3px solid #FF8A3D;
    transform: translate(-50%, -50%);
    font-size: 0; transition: background .3s, transform .3s;
    z-index: 2;
  }
  .milestone-dot.passed { background: #FFD93D; transform: translate(-50%, -50%) scale(1.2); }

  #countdown-badge {
    min-width: 48px; height: 44px; border-radius: 22px;
    background: rgba(255,255,255,0.95);
    font-family: 'Fredoka One', cursive;
    font-size: 22px; color: var(--text-dark);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2); padding: 0 10px;
    transition: transform .2s;
  }
  #countdown-badge.pop {
    animation: popBadge .4s ease;
  }
  @keyframes popBadge {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* ---- tap button ---- */
  #tap-btn {
    position: absolute; bottom: 20px; right: 24px;
    width: 90px; height: 90px; border-radius: 50%;
    border: none; cursor: pointer; z-index: 20;
    font-size: 36px;
    background: radial-gradient(circle at 35% 35%, #FFD93D, #FF8A3D);
    box-shadow: 0 6px 0 #C05A00, 0 8px 20px rgba(0,0,0,0.3);
    transition: transform .1s, box-shadow .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #tap-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #C05A00, 0 4px 10px rgba(0,0,0,0.2); }

  #tap-label {
    position: absolute; bottom: 118px; right: 24px;
    font-family: 'Fredoka One', cursive; font-size: 13px;
    color: white; text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    z-index: 20; text-align: center; width: 90px;
  }

  /* ---- interactive elements ---- */
  .world-object {
    position: absolute; font-size: 32px; cursor: pointer;
    z-index: 8; transition: transform .15s;
    filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.2));
  }
  .world-object:hover { transform: scale(1.2); }
  .world-object.bounce { animation: objBounce .4s ease; }
  @keyframes objBounce {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.4) rotate(10deg); }
  }

  .sparkle {
    position: absolute; pointer-events: none; z-index: 30;
    font-size: 22px; animation: sparkleAnim .7s ease forwards;
  }
  @keyframes sparkleAnim {
    0%   { transform: scale(0) translateY(0); opacity: 1; }
    60%  { transform: scale(1.3) translateY(-30px); opacity: 1; }
    100% { transform: scale(0.5) translateY(-60px); opacity: 0; }
  }

  /* ---- arrival / win ---- */
  #win-screen {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; z-index: 50; backdrop-filter: blur(4px);
  }
  #win-screen.visible { display: flex; }

  .win-card {
    background: #FFF8EC; border-radius: 32px;
    padding: 36px 48px; text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: winPop .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes winPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .win-emoji { font-size: 72px; display: block; animation: winSpin 1s ease; }
  @keyframes winSpin {
    from { transform: rotate(-20deg) scale(0.5); }
    to   { transform: rotate(0deg) scale(1); }
  }
  .win-title {
    font-family: 'Fredoka One', cursive; font-size: 36px; color: var(--text-dark);
    margin: 10px 0 4px;
  }
  .win-sub { font-size: 15px; color: #888; margin-bottom: 20px; }
  .win-btn {
    padding: 14px 32px; border-radius: 40px; border: none; cursor: pointer;
    font-family: 'Fredoka One', cursive; font-size: 20px; color: white;
    background: linear-gradient(135deg, #5DD15A, #3FAD3C);
    box-shadow: 0 5px 0 #2A8028; transition: transform .1s;
    margin: 0 8px;
  }
  .win-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2A8028; }
  .win-btn.orange { background: linear-gradient(135deg, #FF8A3D, #E06820); box-shadow: 0 5px 0 #A04010; }

  /* floating score stars */
  .score-star {
    position: absolute; font-size: 28px; pointer-events: none; z-index: 100;
    animation: starFloat 1.5s ease forwards;
  }
  @keyframes starFloat {
    0%   { transform: translateY(0) scale(0); opacity: 1; }
    40%  { transform: translateY(-60px) scale(1.4); opacity: 1; }
    100% { transform: translateY(-120px) scale(0.8); opacity: 0; }
  }

  /* ---- milestone popup ---- */
  #milestone-popup {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    font-family: 'Fredoka One', cursive; font-size: 48px; color: white;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.25);
    z-index: 30; pointer-events: none; opacity: 0;
    transition: opacity .2s;
  }
  #milestone-popup.show {
    animation: milestonePop .8s ease forwards;
  }
  @keyframes milestonePop {
    0%   { transform: translateX(-50%) scale(0.5); opacity: 0; }
    30%  { transform: translateX(-50%) scale(1.2); opacity: 1; }
    70%  { transform: translateX(-50%) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) scale(0.9) translateY(-20px); opacity: 0; }
  }

  /* ---- particle system ---- */
  .particle {
    position: absolute; border-radius: 50%; pointer-events: none; z-index: 35;
    animation: particleFall 1s ease forwards;
  }
  @keyframes particleFall {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(80px) scale(0); opacity: 0; }
  }
</style>

// ================================================================
//  HOME SCREEN CANVAS ANIMATION
// ================================================================
function initHomeCanvas() {
  const canvas = document.getElementById('home-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 800; canvas.height = 500;

  const clouds = Array.from({length: 6}, () => ({
    x: Math.random() * 800,
    y: 20 + Math.random() * 120,
    size: 40 + Math.random() * 40,
    speed: 0.3 + Math.random() * 0.4
  }));

  function drawCloud(cx, cy, r) {
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.arc(cx+r*0.8, cy-r*0.3, r*0.7, 0, Math.PI*2);
    ctx.arc(cx+r*1.6, cy, r*0.8, 0, Math.PI*2);
    ctx.fill();
  }

  function frame() {
    ctx.clearRect(0, 0, 800, 500);
    // Draw rolling hills
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.ellipse(200,480,300,140,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(600,490,350,160,0,0,Math.PI*2); ctx.fill();

    clouds.forEach(c => {
      drawCloud(c.x, c.y, c.size);
      c.x += c.speed;
      if (c.x > 900) c.x = -120;
    });
    requestAnimationFrame(frame);
  }
  frame();
}

    const card = document.createElement('div');
    card.className = `vehicle-card ${key}-card`;
    card.innerHTML = `
      <div class="card-emoji">${meta.emoji}</div>
      <div class="card-name">${info.nombre}</div>
      <div class="card-stripe"></div>
    `;
    card.style.background = meta.color;
    card.addEventListener('click', () => Game.start(key));
    grid.appendChild(card);
  });
}

// ================================================================
//  PROCEDURAL WORLD GENERATOR
// ================================================================
function generateWorld(vehicleKey) {
  const cfg = LEVEL_CONFIGS[vehicleKey];
  const canvas = document.getElementById('world-canvas');
  const ctx = canvas.getContext('2d');
  const W = 2400, H = 500;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const rng = seededRNG(Date.now());

  // --- Background gradient ---
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, cfg.bgTop);
  grad.addColorStop(1, cfg.bgBottom);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // --- Ground / water strip ---
  if (cfg.groundColor) {
    if (vehicleKey === 'barco') {
      // animated-look waves
      for (let x = 0; x < W; x += 4) {
        const wH = cfg.groundY + Math.sin(x * 0.05) * 8;
        const wGrad = ctx.createLinearGradient(0, wH, 0, H);
        wGrad.addColorStop(0, '#4FC3F7');
        wGrad.addColorStop(1, '#0277BD');
        ctx.fillStyle = wGrad;
        ctx.fillRect(x, wH, 4, H - wH);
      }
    } else if (vehicleKey === 'coche') {
      // road with dashes
      ctx.fillStyle = '#555';
      ctx.fillRect(0, cfg.groundY, W, H - cfg.groundY);
      ctx.fillStyle = '#6BBF4E';
      ctx.fillRect(0, cfg.groundY + 40, W, H - cfg.groundY - 40);
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 4; ctx.setLineDash([40, 40]);
      ctx.beginPath(); ctx.moveTo(0, cfg.groundY + 20); ctx.lineTo(W, cfg.groundY + 20); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.fillStyle = cfg.groundColor;
      ctx.fillRect(0, cfg.groundY, W, H - cfg.groundY);
      // grass texture bumps for train
      if (vehicleKey === 'tren') {
        ctx.fillStyle = '#4E9B35';
        for (let x = 0; x < W; x += 30) {
          ctx.beginPath();
          ctx.arc(x + rng()*20, cfg.groundY, 12 + rng()*8, Math.PI, 0);
          ctx.fill();
        }
        // rails
        ctx.fillStyle = '#888'; ctx.fillRect(0, cfg.groundY - 4, W, 6);
        ctx.fillStyle = '#666'; ctx.fillRect(0, cfg.groundY + 10, W, 6);
        ctx.fillStyle = '#8B6914';
        for (let x = 20; x < W; x += 50) ctx.fillRect(x, cfg.groundY - 6, 30, 22);
      }
    }
  }

  // --- Horizon hills / waves ---
  if (vehicleKey === 'avion') {
    // soft cloud-like horizon
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.ellipse(rng()*W, 380 + rng()*80, 200+rng()*200, 60+rng()*40, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // --- Departure zone (left) ---
  drawZone(ctx, vehicleKey, cfg, 'departure', rng);
  // --- Arrival zone (right) ---
  drawZone(ctx, vehicleKey, cfg, 'arrival', rng);

  // --- Static BG decorations ---
  const bgObjs = cfg.bgObjects;
  for (let x = 200; x < W - 200; x += 60) {
    bgObjs.forEach(o => {
      if (rng() < o.freq * 0.35) {
        const y = o.yMin + rng() * (o.yMax - o.yMin);
        ctx.font = `${24 + rng()*18}px serif`;
        ctx.fillText(o.e, x + rng()*40 - 20, y);
      }
    });
  }

  return { rng, cfg };
}

function drawZone(ctx, vehicleKey, cfg, type, rng) {
  const W = 2400, H = 500;
  const isDepart = type === 'departure';
  const xCenter = isDepart ? 80 : W - 80;

  ctx.font = '48px serif';
  const e = isDepart ? cfg.departureEmoji : cfg.arrivalEmoji;
  ctx.fillText(e, xCenter - 24, (cfg.vehicleY || 240) + 20);

  // Label bubble
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const label = isDepart ? cfg.departureLabel : cfg.arrivalLabel;
  ctx.font = 'bold 13px Nunito, sans-serif';
  const tw = ctx.measureText(label).width + 16;
  const bx = isDepart ? 20 : W - 20 - tw;
  const by = (cfg.vehicleY || 240) + 30;
  roundRect(ctx, bx, by, tw, 26, 10);
  ctx.fillStyle = '#2C2C54';
  ctx.fillText(label, bx + 8, by + 18);

  // Decorative extras
  if (vehicleKey === 'avion') {
    ctx.font = '32px serif';
    if (isDepart) { ctx.fillText('🏗', xCenter + 30, cfg.vehicleY + 40); }
    else          { ctx.fillText('🌴', xCenter - 10, cfg.vehicleY + 40); ctx.fillText('🌴', xCenter + 30, cfg.vehicleY + 50); }
  }
  if (vehicleKey === 'tren') {
    ctx.font = '36px serif';
    if (isDepart) { ctx.fillText('🚉', xCenter + 20, cfg.groundY - 20); }
    else          { ctx.fillText('🏔', xCenter - 20, cfg.groundY - 60); }
  }
  if (vehicleKey === 'barco') {
    ctx.font = '36px serif';
    if (isDepart) { ctx.fillText('⚓', xCenter + 20, cfg.groundY - 10); }
    else          { ctx.fillText('🏝', xCenter - 20, cfg.groundY - 30); }
  }
  if (vehicleKey === 'coche') {
    ctx.font = '32px serif';
    if (isDepart) { ctx.fillText('🏘', xCenter + 10, cfg.groundY - 20); }
    else          { ctx.fillText('🎡', xCenter - 20, cfg.groundY - 40); }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath(); ctx.fill();
}

// Seeded RNG (simple LCG)
function seededRNG(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

// ================================================================
//  GAME ENGINE
// ================================================================
const Game = (() => {
  let vehicleKey = null;
  let progress = 0;          // 0..1
  let scrollX = 0;
  let speed = 0;
  let maxSpeed = 3.5;
  let friction = 0.94;
  let animFrame = null;
  let worldObjects = [];
  let milestone = 10;
  let cfg = null;
  let isRunning = false;

  const WORLD_W = 2400;
  const VIEW_W  = 800;
  const VIEWPORT_MARGIN = 150;
  const MILESTONES = 10;
  const TOTAL_SCROLL = WORLD_W - VIEW_W;

  function start(key) {
    vehicleKey = key;
    progress = 0; scrollX = 0; speed = 0;
    milestone = 10; isRunning = true;
    cfg = LEVEL_CONFIGS[key];

    // Switch screen
    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');

    // Set vehicle emoji
    const sprite = document.getElementById('vehicle-sprite');
    sprite.textContent = VEHICLE_META[key].emoji;
    sprite.style.top = cfg.vehicleY + 'px';
    sprite.style.left = '120px';

    // Generate world
    generateWorld(key);

    // Build interactive objects
    buildWorldObjects(key);

    // Build milestone dots
    buildMilestoneDots();

    // Reset UI
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('countdown-badge').textContent = '10';
    document.getElementById('win-screen').classList.remove('visible');
    document.getElementById('tap-btn').textContent = '⭐';

    // Vehicle bob animation
    sprite.style.animation = key === 'barco'
      ? 'cardFloat 1.5s ease-in-out infinite'
      : key === 'avion'
      ? 'cardFloat 2.5s ease-in-out infinite'
      : 'none';

    // Start loop
    if (animFrame) cancelAnimationFrame(animFrame);
    loop();
  }

  function buildWorldObjects(key) {
    const world = document.getElementById('world');
    // Remove old
    world.querySelectorAll('.world-object').forEach(e => e.remove());
    worldObjects = [];

    const c = LEVEL_CONFIGS[key];
    // Place ~12 interactive objects distributed across the world
    const objs = c.interactiveObjects;
    for (let i = 0; i < 12; i++) {
      const rng2 = seededRNG(Date.now() + i * 999);
      const obj = objs[Math.floor(rng2() * objs.length)];
      const worldX = 300 + Math.random() * (WORLD_W - 500);
      const y = c.vehicleY - 60 + (Math.random() - 0.5) * 120;

      const el = document.createElement('div');
      el.className = 'world-object';
      el.textContent = obj.e;
      el.dataset.worldX = worldX;
      el.dataset.stars = obj.stars;
      el.dataset.label = obj.label;
      el.style.top = y + 'px';
      el.style.left = worldX + 'px';

      el.addEventListener('click', () => onObjectClick(el, obj));
      world.appendChild(el);
      worldObjects.push(el);
    }
  }

  function buildMilestoneDots() {
    const bar = document.getElementById('progress-bar-container');
    bar.querySelectorAll('.milestone-dot').forEach(d => d.remove());
    for (let i = 1; i <= MILESTONES; i++) {
      const d = document.createElement('div');
      d.className = 'milestone-dot';
      d.style.left = (i / (MILESTONES + 1) * 100) + '%';
      d.dataset.m = i;
      bar.appendChild(d);
    }
  }

  function onObjectClick(el, obj) {
    if (el.dataset.clicked) return;
    el.dataset.clicked = 1;
    el.classList.add('bounce');

    // Stars
    const n = parseInt(el.dataset.stars);
    for (let i = 0; i < n; i++) {
      spawnStar(el);
    }

    // Sparkle
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.textContent = '✨';
    sp.style.left = el.style.left;
    sp.style.top = (parseFloat(el.style.top) - 20) + 'px';
    document.getElementById('world').appendChild(sp);
    setTimeout(() => sp.remove(), 800);

    // Boost
    speed += 0.8 + n * 0.3;

    setTimeout(() => { el.style.opacity = '0.3'; }, 600);
  }

  function spawnStar(el) {
    const rect = el.getBoundingClientRect();
    const appRect = document.getElementById('app').getBoundingClientRect();
    const s = document.createElement('div');
    s.className = 'score-star';
    s.textContent = '⭐';
    s.style.left = (rect.left - appRect.left + Math.random()*20 - 10) + 'px';
    s.style.top  = (rect.top  - appRect.top) + 'px';
    document.getElementById('game-screen').appendChild(s);
    setTimeout(() => s.remove(), 1500);
  }

  function loop() {
    if (!isRunning) return;

    // Move world
    speed += 0.05; // gravity / air push
    if (speed > maxSpeed) speed = maxSpeed;
    scrollX += speed;
    speed *= friction;

    if (scrollX >= TOTAL_SCROLL) {
      scrollX = TOTAL_SCROLL;
      progress = 1;
      isRunning = false;
      updateUI();
      setTimeout(showWin, 600);
      return;
    }

    progress = scrollX / TOTAL_SCROLL;
    updateUI();
    updateWorldObjects();
    animFrame = requestAnimationFrame(loop);
  }

  function updateUI() {
    // Scroll world canvas
    document.getElementById('world-canvas').style.transform = `translateX(${-scrollX}px)`;
    document.querySelectorAll('.world-object').forEach(el => {
      el.style.transform = `translateX(${-scrollX}px)`;
    });

    // Progress bar
    const pct = progress * 100;
    document.getElementById('progress-bar').style.width = pct + '%';

    // Milestones — countdown from 10 to 1
    const passed = Math.floor(progress * (MILESTONES + 1));
    const remaining = Math.max(0, MILESTONES - passed + 1);
    const badge = document.getElementById('countdown-badge');

    // Check milestone crossing
    if (remaining < milestone && remaining >= 0) {
      milestone = remaining;
      badge.textContent = milestone > 0 ? milestone : '🏁';
      badge.classList.remove('pop');
      void badge.offsetWidth;
      badge.classList.add('pop');

      // Flash milestone on screen
      const popup = document.getElementById('milestone-popup');
      popup.textContent = milestone > 0 ? milestone : '🏁';
      popup.classList.remove('show');
      void popup.offsetWidth;
      popup.classList.add('show');

      // Mark dots
      document.querySelectorAll('.milestone-dot').forEach(d => {
        const m = parseInt(d.dataset.m);
        if (m <= (MILESTONES - milestone)) d.classList.add('passed');
      });

      // Particles
      spawnParticles();
    }

    // Vehicle bob y based on speed
    const sprite = document.getElementById('vehicle-sprite');
    if (vehicleKey === 'barco') {
      const wave = Math.sin(scrollX * 0.03) * 12;
      sprite.style.top = (cfg.vehicleY + wave) + 'px';
    } else if (vehicleKey === 'avion') {
      const drift = Math.sin(scrollX * 0.02) * 15;
      sprite.style.top = (cfg.vehicleY + drift) + 'px';
    }
  }

  function updateWorldObjects() {
    // No positional update needed; CSS transform handles it
  }

  function spawnParticles() {
    const colors = cfg.particleColors;
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.width = p.style.height = (6 + Math.random()*8) + 'px';
      p.style.left = (100 + Math.random() * 600) + 'px';
      p.style.top  = (60 + Math.random() * 100) + 'px';
      p.style.animationDelay = (Math.random() * 0.3) + 's';
      document.getElementById('game-screen').appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }

  function showWin() {
    const ws = document.getElementById('win-screen');
    document.getElementById('win-emoji').textContent  = cfg.winEmoji;
    document.getElementById('win-title').textContent = cfg.winTitle;
    document.getElementById('win-sub').textContent   = cfg.winSub;
    ws.classList.add('visible');
  }

  function restart() {
    start(vehicleKey);
  }

  function goHome() {
    isRunning = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('active');
    document.getElementById('win-screen').classList.remove('visible');
  }

  // Tap button: burst of speed
  document.getElementById('tap-btn').addEventListener('click', () => {
    if (!isRunning) return;
    speed = Math.min(speed + 2.5, maxSpeed * 1.4);
    const btn = document.getElementById('tap-btn');
    btn.style.transform = 'scale(0.9) translateY(4px)';
    setTimeout(() => btn.style.transform = '', 150);

    // Mini burst particles
    const c = cfg ? cfg.particleColors : ['#FFD93D'];
    for (let i = 0; i < 5; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.background = c[Math.floor(Math.random()*c.length)];
      p.style.width = p.style.height = (8 + Math.random()*6)+'px';
      p.style.right = (30 + Math.random()*60)+'px';
      p.style.bottom = (100 + Math.random()*60)+'px';
      document.getElementById('game-screen').appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
  });

  document.getElementById('back-btn').addEventListener('click', goHome);

  return { start, restart, goHome };
})();

// ================================================================
//  INIT
// ================================================================
window.addEventListener('load', () => {
  initHomeCanvas();
  buildHomeScreen();
});
</script>
