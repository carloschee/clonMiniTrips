<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Viajes Divertidos - Mini Clon</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --bg: #F7FFF7;
            --text: #2C3E50;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Previene el scroll en móviles al jugar */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Capas de Interfaz */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permite clicks a través de la interfaz transparente */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .active-ui {
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        /* Menú Principal */
        #main-menu {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .title {
            font-size: 3rem;
            color: var(--text);
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            margin-bottom: 2rem;
            text-align: center;
            animation: bounce 2s infinite ease-in-out;
        }

        .grid-vehiculos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .btn-vehiculo {
            background: white;
            border: 4px solid var(--secondary);
            border-radius: 20px;
            padding: 20px;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-vehiculo span {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text);
            margin-top: 10px;
        }

        .btn-vehiculo:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
        }

        /* UI del Juego */
        #game-ui {
            justify-content: flex-start;
            padding: 20px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .btn-volver {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 20px;
            height: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            border: 2px solid white;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.1s linear;
        }

        .instrucciones {
            position: absolute;
            bottom: 30px;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            color: var(--text);
            pointer-events: none;
            animation: fadeout 5s forwards;
            animation-delay: 3s;
        }

        /* Pantalla de Victoria */
        #victory-screen {
            background: rgba(255, 255, 255, 0.9);
            z-index: 10;
        }

        .btn-jugar-de-nuevo {
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeout {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Canvas donde se renderiza el juego -->
    <canvas id="gameCanvas"></canvas>

    <!-- Menú Principal -->
    <div id="main-menu" class="ui-layer active-ui">
        <h1 class="title">Viajes Divertidos</h1>
        <div class="grid-vehiculos">
            <button class="btn-vehiculo" onclick="iniciarJuego('auto')">
                🚗 <span>Auto</span>
            </button>
            <button class="btn-vehiculo" onclick="iniciarJuego('barco')">
                ⛵ <span>Barco</span>
            </button>
            <button class="btn-vehiculo" onclick="iniciarJuego('tren')">
                🚂 <span>Tren</span>
            </button>
            <button class="btn-vehiculo" onclick="iniciarJuego('avion')">
                ✈️ <span>Avión</span>
            </button>
        </div>
    </div>

    <!-- UI en Juego -->
    <div id="game-ui" class="ui-layer hidden">
        <div class="top-bar">
            <button class="btn-volver" onclick="volverAlMenu()">🏠</button>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div style="width: 50px;"></div> <!-- Espaciador -->
        </div>
        <div class="instrucciones">Mantén presionado para avanzar. ¡Toca los objetos!</div>
    </div>

    <!-- Pantalla de Victoria -->
    <div id="victory-screen" class="ui-layer hidden">
        <h1 class="title" style="font-size: 4rem;">¡Llegaste! 🎉</h1>
        <div id="victory-stars" style="font-size: 3rem; margin: 10px;">⭐ ⭐ ⭐</div>
        <button class="btn-jugar-de-nuevo" onclick="volverAlMenu()">Jugar de nuevo</button>
    </div>

<script>
/**
 * SISTEMA PRINCIPAL DEL JUEGO
 * Maneja el renderizado en canvas, físicas simples, y generación procedural.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Variables de estado
let estadoJuego = 'MENU'; // MENU, JUGANDO, VICTORIA
let vehiculoActual = null;
let animFrameId;
let tiempoAnterior = 0;

// Mundo y Cámara
const LONGITUD_NIVEL = 15000;
let camaraX = 0;
let camaraY = 0;
let anchoMundo = LONGITUD_NIVEL;
let nivelGenerado = [];
let particulas = [];
let marcadores = [];

// Jugador
let jugador = {
    x: 0,
    y: 0,
    velocidadX: 0,
    velocidadY: 0,
    emoji: '🚗',
    tipo: 'tierra', // tierra, agua, aire, via
    rotacion: 0
};

// Controles
let inputs = {
    presionado: false,
    x: 0,
    y: 0,
    mitadDerecha: false
};

// Configuración de los Vehículos y sus entornos
const CONFIGURACION = {
    auto: {
        emoji: '🚗', tipo: 'tierra', colorCielo: '#87CEEB', colorFondo: '#a8e6cf',
        marcadores: '🪧', elementos: ['🐄', '🌳', '🌲', '🐑', '🌻', '🍄', '🏕️', '🐦'],
        generarTerreno: (x) => Math.sin(x / 300) * 40 + Math.sin(x / 800) * 60 + canvas.height * 0.7
    },
    barco: {
        emoji: '⛵', tipo: 'agua', colorCielo: '#E0F7FA', colorFondo: '#0288D1',
        marcadores: '🛟', elementos: ['🐟', '🐬', '🐙', '🏝️', '🦀', '🦆', '🐚', '🐳'],
        generarTerreno: (x, tiempo) => Math.sin(x / 150 + tiempo * 2) * 15 + Math.sin(x / 400 + tiempo) * 20 + canvas.height * 0.65
    },
    tren: {
        emoji: '🚂', tipo: 'via', colorCielo: '#B3E5FC', colorFondo: '#8D6E63',
        marcadores: '🚦', elementos: ['🛤️', '⛰️', '🐎', '🏡', '🏭', '🌲', '🐄', '☁️'],
        generarTerreno: (x) => Math.sin(x / 600) * 30 + canvas.height * 0.75
    },
    avion: {
        emoji: '✈️', tipo: 'aire', colorCielo: '#4FC3F7', colorFondo: '#E1F5FE',
        marcadores: '🎈', elementos: ['☁️', '🦅', '🌤️', '🛸', '🪁', '🚁', '🌈', '🕊️'],
        generarTerreno: (x) => canvas.height * 0.9 // Suelo muy bajo, vuela libre
    }
};

// --- SONIDO SINTETIZADO (Web Audio API) ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new AudioContext();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function reproducirSonido(tipo) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const ahora = audioCtx.currentTime;
    
    if (tipo === 'interactuar') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, ahora);
        osc.frequency.exponentialRampToValueAtTime(800, ahora + 0.1);
        gain.gain.setValueAtTime(0.3, ahora);
        gain.gain.exponentialRampToValueAtTime(0.01, ahora + 0.1);
        osc.start(ahora);
        osc.stop(ahora + 0.1);
    } else if (tipo === 'meta') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, ahora); // A4
        osc.frequency.setValueAtTime(554, ahora + 0.2); // C#5
        osc.frequency.setValueAtTime(659, ahora + 0.4); // E5
        osc.frequency.setValueAtTime(880, ahora + 0.6); // A5
        gain.gain.setValueAtTime(0.3, ahora);
        gain.gain.linearRampToValueAtTime(0, ahora + 1.0);
        osc.start(ahora);
        osc.stop(ahora + 1.0);
    }
}

// --- AJUSTE DE PANTALLA ---
function redimensionarCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', redimensionarCanvas);
redimensionarCanvas(); // Inicializar

// --- EVENTOS DE ENTRADA (Touch y Mouse) ---
function manejarInicioEntrada(e) {
    if (estadoJuego !== 'JUGANDO') return;
    initAudio(); // Inicializar audio en la primera interacción
    inputs.presionado = true;
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    inputs.x = clientX;
    inputs.y = clientY;
    inputs.mitadDerecha = clientX > window.innerWidth / 2;

    // Detectar interacción con elementos del entorno
    const mundoX = clientX + camaraX;
    const mundoY = clientY + camaraY;
    
    let interactuo = false;
    for (let el of nivelGenerado) {
        // Distancia simple para colisión circular (hitbox grande para niños)
        const dist = Math.hypot(el.x - mundoX, el.y - mundoY);
        if (dist < 80) {
            el.interactuar();
            interactuo = true;
            break;
        }
    }
    
    // Si no tocamos un objeto, aceleramos (la lógica está en el bucle principal)
}

function manejarFinEntrada(e) {
    inputs.presionado = false;
}

function manejarMovimientoEntrada(e) {
    if (!inputs.presionado) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    inputs.x = clientX;
    inputs.y = clientY;
    inputs.mitadDerecha = clientX > window.innerWidth / 2;
}

// Listeners
canvas.addEventListener('mousedown', manejarInicioEntrada);
window.addEventListener('mouseup', manejarFinEntrada);
canvas.addEventListener('mousemove', manejarMovimientoEntrada);
canvas.addEventListener('touchstart', manejarInicioEntrada, {passive: false});
window.addEventListener('touchend', manejarFinEntrada);
canvas.addEventListener('touchmove', manejarMovimientoEntrada, {passive: false});

// --- LÓGICA DEL JUEGO ---

function iniciarJuego(tipoVehiculo) {
    initAudio();
    vehiculoActual = CONFIGURACION[tipoVehiculo];
    jugador.emoji = vehiculoActual.emoji;
    jugador.tipo = vehiculoActual.tipo;
    jugador.x = 200; // Posición inicial
    jugador.y = canvas.height / 2;
    jugador.velocidadX = 0;
    jugador.velocidadY = 0;
    
    camaraX = 0;
    camaraY = 0;
    tiempoAnterior = performance.now();
    
    generarNivel();
    
    // Cambiar UI
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('victory-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    
    estadoJuego = 'JUGANDO';
    
    if (animFrameId) cancelAnimationFrame(animFrameId);
    buclePrincipal(tiempoAnterior);
}

function volverAlMenu() {
    estadoJuego = 'MENU';
    if (animFrameId) cancelAnimationFrame(animFrameId);
    
    document.getElementById('game-ui').classList.add('hidden');
    document.getElementById('victory-screen').classList.add('hidden');
    document.getElementById('main-menu').classList.remove('hidden');
}

function mostrarVictoria() {
    estadoJuego = 'VICTORIA';
    reproducirSonido('meta');
    
    // Lluvia de confeti
    for(let i=0; i<100; i++) {
        crearParticula(jugador.x + Math.random()*200 - 100, jugador.y - Math.random()*200, ['🎉', '🎊', '⭐', '🎈'][Math.floor(Math.random()*4)]);
    }

    document.getElementById('game-ui').classList.add('hidden');
    document.getElementById('victory-screen').classList.remove('hidden');
}

// --- GENERACIÓN PROCEDURAL ---

class ElementoEntorno {
    constructor(x, y, emoji, tipoVehiculo) {
        this.x = x;
        this.y = y;
        this.yBase = y; // Para animaciones que vuelven a la base
        this.emoji = emoji;
        this.escala = 1.0 + Math.random() * 0.5;
        this.tiempoAnimacion = 0;
        this.estadoAnimacion = 'reposo'; // reposo, saltando, girando
        this.tipoVehiculo = tipoVehiculo;
    }

    interactuar() {
        if (this.estadoAnimacion !== 'reposo') return;
        
        reproducirSonido('interactuar');
        
        // Decidir animación aleatoria
        const r = Math.random();
        if (r < 0.5) {
            this.estadoAnimacion = 'saltando';
        } else {
            this.estadoAnimacion = 'girando';
        }
        this.tiempoAnimacion = 0;
        
        // Crear partículas visuales
        crearParticula(this.x, this.y - 40, '✨');
        if (this.emoji === '☁️') crearParticula(this.x, this.y, '💨');
        if (this.emoji === '🐟') crearParticula(this.x, this.y, '💧');
    }

    actualizar(dt) {
        if (this.estadoAnimacion === 'saltando') {
            this.tiempoAnimacion += dt;
            const progreso = this.tiempoAnimacion / 0.5; // dura 0.5s
            if (progreso >= 1) {
                this.estadoAnimacion = 'reposo';
                this.y = this.yBase;
            } else {
                // Parábola simple
                this.y = this.yBase - Math.sin(progreso * Math.PI) * 100;
            }
        } else if (this.estadoAnimacion === 'girando') {
            this.tiempoAnimacion += dt;
            if (this.tiempoAnimacion > 1.0) {
                this.estadoAnimacion = 'reposo';
            }
        }
    }

    dibujar(ctx) {
        ctx.save();
        ctx.translate(this.x - camaraX, this.y - camaraY);
        
        if (this.estadoAnimacion === 'girando') {
            ctx.rotate(this.tiempoAnimacion * Math.PI * 2);
        }
        
        // Si es un barco, los elementos flotan un poco
        if (this.tipoVehiculo === 'agua' && this.estadoAnimacion === 'reposo') {
            ctx.translate(0, Math.sin(performance.now() / 300 + this.x) * 5);
        }

        ctx.scale(this.escala, this.escala);
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
    }
}

function generarNivel() {
    nivelGenerado = [];
    marcadores = [];
    particulas = [];
    
    // 1. Crear el punto de inicio
    nivelGenerado.push(new ElementoEntorno(200, vehiculoActual.generarTerreno(200, 0) - 50, '🏁', jugador.tipo));

    // 2. Crear las 10 secciones y sus marcadores
    const distanciaPorSeccion = (LONGITUD_NIVEL - 2000) / 10;
    
    for (let i = 10; i >= 1; i--) {
        const xMarcador = 1000 + (10 - i) * distanciaPorSeccion;
        let yMarcador = vehiculoActual.generarTerreno(xMarcador, 0) - 60;
        
        // Ajustes específicos de altura por entorno
        if (jugador.tipo === 'aire') yMarcador = canvas.height * 0.2 + Math.random() * (canvas.height * 0.5);
        
        marcadores.push({
            x: xMarcador,
            y: yMarcador,
            numero: i,
            emoji: vehiculoActual.marcadores,
            pasado: false
        });
        
        // 3. Rellenar la sección con elementos aleatorios del entorno
        const numElementos = 5 + Math.floor(Math.random() * 5);
        for (let j = 0; j < numElementos; j++) {
            const xAleatoria = xMarcador + Math.random() * distanciaPorSeccion;
            let yAleatoria = vehiculoActual.generarTerreno(xAleatoria, 0);
            
            // Variación vertical según el vehículo
            if (jugador.tipo === 'aire') {
                yAleatoria = Math.random() * canvas.height * 0.8; // Cielo
            } else if (jugador.tipo === 'agua') {
                yAleatoria += (Math.random() * 40 - 20); // Cerca del agua
            } else {
                yAleatoria -= 30; // Sobre la tierra/vía
            }
            
            const emojiAleatorio = vehiculoActual.elementos[Math.floor(Math.random() * vehiculoActual.elementos.length)];
            nivelGenerado.push(new ElementoEntorno(xAleatoria, yAleatoria, emojiAleatorio, jugador.tipo));
        }
    }

    // 4. Crear la Meta final
    nivelGenerado.push(new ElementoEntorno(LONGITUD_NIVEL - 500, vehiculoActual.generarTerreno(LONGITUD_NIVEL - 500, 0) - 50, '🏰', jugador.tipo));
}

function crearParticula(x, y, emoji) {
    particulas.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 1) * 200,
        vida: 1.0,
        emoji: emoji
    });
}

// --- ACTUALIZACIÓN PRINCIPAL ---

function actualizarFisicas(dt) {
    // 1. Control de movimiento horizontal
    const velocidadMaxima = 400; // píxeles por segundo
    let aceleracionX = 0;

    if (inputs.presionado) {
        if (inputs.mitadDerecha) {
            aceleracionX = 800; // Avanzar
        } else {
            aceleracionX = -400; // Retroceder/Frenar
        }
    } else {
        // Fricción suave
        jugador.velocidadX *= 0.95;
    }

    jugador.velocidadX += aceleracionX * dt;
    
    // Limitar velocidad
    if (jugador.velocidadX > velocidadMaxima) jugador.velocidadX = velocidadMaxima;
    if (jugador.velocidadX < -velocidadMaxima/2) jugador.velocidadX = -velocidadMaxima/2;

    // Detener completamente si es muy lento
    if (Math.abs(jugador.velocidadX) < 10 && !inputs.presionado) jugador.velocidadX = 0;

    jugador.x += jugador.velocidadX * dt;

    // Evitar que vaya hacia atrás del inicio
    if (jugador.x < 100) {
        jugador.x = 100;
        jugador.velocidadX = 0;
    }

    // 2. Control de movimiento vertical (Adaptado por vehículo)
    const tiempoMundo = performance.now() / 1000;
    const terrenoY = vehiculoActual.generarTerreno(jugador.x, tiempoMundo);

    if (jugador.tipo === 'aire') {
        // El avión sigue la Y del dedo si está presionado
        if (inputs.presionado) {
            const objetivoY = inputs.y + camaraY;
            jugador.y += (objetivoY - jugador.y) * 5 * dt; // Suavizado
        }
        // Límites cielo/suelo
        if (jugador.y < 50) jugador.y = 50;
        if (jugador.y > terrenoY - 50) jugador.y = terrenoY - 50;
        
        // Inclinación
        jugador.rotacion = jugador.velocidadX * 0.0005 + (inputs.presionado ? (inputs.y + camaraY - jugador.y)*0.002 : 0);

    } else if (jugador.tipo === 'agua') {
        // El barco flota en la ola actual
        jugador.y = terrenoY - 30; // Flota encima
        // Rotación basada en la derivada (pendiente) de la ola
        const terrenoFuturo = vehiculoActual.generarTerreno(jugador.x + 10, tiempoMundo);
        jugador.rotacion = Math.atan2(terrenoFuturo - terrenoY, 10);
        
    } else {
        // Auto y Tren: Se pegan al suelo suavemente
        jugador.y = terrenoY - 40;
        // Rotación basada en el terreno
        const terrenoFuturo = vehiculoActual.generarTerreno(jugador.x + 20, tiempoMundo);
        jugador.rotacion = Math.atan2(terrenoFuturo - terrenoY, 20);
        
        // Animación de baches al moverse
        if (jugador.velocidadX > 50 && jugador.tipo === 'tierra') {
            jugador.y += Math.sin(tiempoMundo * 20) * 3;
        }
    }

    // 3. Actualizar Cámara (Sigue al jugador)
    camaraX = jugador.x - canvas.width * 0.3; // Jugador a un tercio de la pantalla
    // Limitar cámara izquierda
    if (camaraX < 0) camaraX = 0;
    
    // Suavizar Y de la cámara para que no maree
    const camaraObjetivoY = jugador.y - canvas.height / 2;
    camaraY += (camaraObjetivoY - camaraY) * 2 * dt;

    // 4. Actualizar Elementos
    for (let el of nivelGenerado) {
        // Solo actualizar si están cerca de la cámara por rendimiento
        if (el.x > camaraX - 200 && el.x < camaraX + canvas.width + 200) {
            el.actualizar(dt);
        }
    }

    // 5. Actualizar Partículas
    for (let i = particulas.length - 1; i >= 0; i--) {
        let p = particulas[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 500 * dt; // Gravedad
        p.vida -= dt;
        if (p.vida <= 0) {
            particulas.splice(i, 1);
        }
    }

    // 6. Revisar Marcadores y Progreso
    let progresoActual = (jugador.x / LONGITUD_NIVEL) * 100;
    if (progresoActual > 100) progresoActual = 100;
    document.getElementById('progress-bar').style.width = `${progresoActual}%`;

    for (let m of marcadores) {
        if (!m.pasado && jugador.x > m.x) {
            m.pasado = true;
            crearParticula(m.x, m.y - 50, '✨');
            reproducirSonido('interactuar');
        }
    }

    // 7. Condición de Victoria
    if (jugador.x >= LONGITUD_NIVEL - 500 && estadoJuego === 'JUGANDO') {
        mostrarVictoria();
    }
}

// --- RENDERIZADO ---

function dibujar(dt) {
    // 1. Limpiar pantalla con el color del cielo
    ctx.fillStyle = vehiculoActual.colorCielo;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const tiempoMundo = performance.now() / 1000;

    // 2. Dibujar fondo/parallax simple (Nubes/Montañas)
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.font = '80px Arial';
    for(let i=0; i<LONGITUD_NIVEL; i+=800) {
        const parallaxX = (i - camaraX * 0.2);
        // Mostrar en pantalla solo lo visible
        if(parallaxX > -100 && parallaxX < canvas.width + 100) {
            if(jugador.tipo === 'aire' || jugador.tipo === 'tierra') {
                ctx.fillText('☁️', parallaxX, canvas.height * 0.2 + Math.sin(i)*50);
            }
            if(jugador.tipo === 'via') {
                ctx.fillText('⛰️', parallaxX, canvas.height * 0.6 + Math.sin(i)*30);
            }
        }
    }
    ctx.restore();

    // 3. Dibujar Terreno / Agua
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    
    // Calcular puntos de la curva del terreno visibles en pantalla
    const inicioX = Math.floor(camaraX);
    const finX = Math.floor(camaraX + canvas.width);
    
    // Punto inicial a la izquierda
    ctx.lineTo(0, vehiculoActual.generarTerreno(inicioX, tiempoMundo) - camaraY);

    for (let x = inicioX; x <= finX; x += 50) {
        const y = vehiculoActual.generarTerreno(x, tiempoMundo) - camaraY;
        ctx.lineTo(x - camaraX, y);
    }
    
    // Punto final a la derecha
    ctx.lineTo(canvas.width, vehiculoActual.generarTerreno(finX, tiempoMundo) - camaraY);
    ctx.lineTo(canvas.width, canvas.height);
    
    ctx.fillStyle = vehiculoActual.colorFondo;
    
    if (jugador.tipo === 'agua') {
        ctx.globalAlpha = 0.8; // Agua semitransparente
        ctx.fill();
        ctx.globalAlpha = 1.0;
        // Línea de superficie del agua
        ctx.strokeStyle = '#81D4FA';
        ctx.lineWidth = 5;
        ctx.stroke();
    } else {
        ctx.fill();
        if (jugador.tipo === 'tierra') {
            ctx.strokeStyle = '#81C784';
            ctx.lineWidth = 8;
            ctx.stroke();
        } else if (jugador.tipo === 'via') {
            // Dibujar vía del tren encima de la curva
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = 10;
            ctx.stroke();
            // Durmientes
            ctx.strokeStyle = '#3E2723';
            ctx.lineWidth = 3;
            for (let x = inicioX; x <= finX; x += 60) {
                const y = vehiculoActual.generarTerreno(x, tiempoMundo) - camaraY;
                ctx.beginPath();
                ctx.moveTo(x - camaraX, y - 10);
                ctx.lineTo(x - camaraX, y + 10);
                ctx.stroke();
            }
        }
    }

    // 4. Dibujar Elementos del Nivel (culling básico)
    for (let el of nivelGenerado) {
        if (el.x > camaraX - 100 && el.x < camaraX + canvas.width + 100) {
            el.dibujar(ctx);
        }
    }

    // 5. Dibujar Marcadores (10 a 1)
    for (let m of marcadores) {
        if (m.x > camaraX - 100 && m.x < camaraX + canvas.width + 100) {
            ctx.save();
            ctx.translate(m.x - camaraX, m.y - camaraY);
            
            // Efecto de rebote si ya se pasó
            if (m.pasado) {
                ctx.scale(1.2, 1.2);
                ctx.globalAlpha = 0.5;
            } else {
                // Pequeña flotación
                ctx.translate(0, Math.sin(tiempoMundo * 3 + m.x) * 5);
            }

            // Dibujar icono marcador
            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(m.emoji, 0, 0);
            
            // Dibujar el número encima
            ctx.font = 'bold 30px Arial';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.strokeText(m.numero, 0, 5);
            ctx.fillText(m.numero, 0, 5);
            
            ctx.restore();
        }
    }

    // 6. Dibujar Jugador
    ctx.save();
    ctx.translate(jugador.x - camaraX, jugador.y - camaraY);
    ctx.rotate(jugador.rotacion);
    
    // Ligero rebote por respiración/motor
    ctx.translate(0, Math.sin(tiempoMundo * 10) * 2);

    ctx.font = '70px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Si va hacia atrás, voltear
    if (jugador.velocidadX < -10) {
        ctx.scale(-1, 1);
    }
    
    ctx.fillText(jugador.emoji, 0, 0);
    ctx.restore();

    // 7. Dibujar Partículas
    for (let p of particulas) {
        ctx.save();
        ctx.translate(p.x - camaraX, p.y - camaraY);
        ctx.globalAlpha = p.vida; // Desvanecer
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.emoji, 0, 0);
        ctx.restore();
    }
}

function buclePrincipal(timestamp) {
    if (estadoJuego !== 'JUGANDO') return;
    
    // Calcular Delta Time (dt) seguro
    let dt = (timestamp - tiempoAnterior) / 1000;
    if (dt > 0.1) dt = 0.1; // Límite para evitar saltos locos si la pestaña se pausa
    tiempoAnterior = timestamp;

    actualizarFisicas(dt);
    dibujar(dt);

    animFrameId = requestAnimationFrame(buclePrincipal);
}

// Inicialización de la pantalla
ctx.fillStyle = '#F7FFF7';
ctx.fillRect(0, 0, canvas.width, canvas.height);

</script>
