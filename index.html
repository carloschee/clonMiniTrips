<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Meta etiquetas cruciales para iPhone 13 y PWA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mini Trips">
<meta name="theme-color" content="#87CEEB">

<title>Mini Trips!</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --sky-top: #87CEEB;
    --sky-bottom: #B8E4F9;
    --ground: #6BBF4E;
    --ground-dark: #4E9B35;
    --water: #3A9FD8;
    --water-dark: #2278A8;
    --sand: #F5D77A;
    --cloud: #FFFFFF;
    --sun: #FFD93D;
    --star: #FFE566;
    --ui-bg: #FFF8EC;
    --ui-shadow: rgba(0,0,0,0.18);
    --btn-green: #5DD15A;
    --btn-green-dark: #3FAD3C;
    --btn-orange: #FF8A3D;
    --btn-orange-dark: #E06820;
    --btn-blue: #4FC3F7;
    --btn-blue-dark: #29B6F6;
  }

  /* Reset y preparación para iPhone 13 */
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background-color: var(--sky-top);
    touch-action: none; /* Previene gestos nativos del navegador */
  }

  h1, h2, h3 {
    font-family: 'Fredoka One', cursive;
    margin: 0;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
  }

  /* Sistema de Pantallas */
  .screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    /* Respetar el notch y la barra inferior del iPhone 13 */
    padding-top: env(safe-area-inset-top, 47px);
    padding-bottom: env(safe-area-inset-bottom, 34px);
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    z-index: 10;
  }

  .screen.active {
    display: flex;
  }

  /* HOME SCREEN */
  #home-screen {
    justify-content: center;
    gap: 20px;
    background: var(--ui-bg);
  }
  
  .title-card {
    background: white;
    padding: 30px;
    border-radius: 30px;
    box-shadow: 0 10px 20px var(--ui-shadow);
    text-align: center;
    margin-bottom: 20px;
    border: 4px solid var(--sky-bottom);
  }

  .title-card h1 {
    font-size: 3rem;
    color: var(--btn-orange);
  }

  .mode-selector {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }

  .mode-btn {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    border: none;
    background: white;
    font-size: 2.5rem;
    box-shadow: 0 6px 0 var(--sky-bottom);
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mode-btn:active, .mode-btn.selected {
    transform: translateY(6px);
    box-shadow: 0 0 0 var(--sky-bottom);
    border: 4px solid var(--btn-orange);
  }

  .play-btn {
    background: var(--btn-green);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    padding: 15px 50px;
    border: none;
    border-radius: 30px;
    box-shadow: 0 8px 0 var(--btn-green-dark);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .play-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--btn-green-dark);
  }

  /* Configuración de Sprites */
  .sprite-config {
    margin-top: 30px;
    background: rgba(0,0,0,0.05);
    padding: 15px 20px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .sprite-config label {
    font-weight: 800;
    color: #555;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
  }
  
  .sprite-config input[type="checkbox"] {
    width: 24px;
    height: 24px;
    accent-color: var(--btn-orange);
  }

  .sprite-hint {
    font-size: 0.85rem;
    color: #777;
    text-align: center;
  }

  /* GAME SCREEN */
  #game-screen {
    justify-content: space-between;
    overflow: hidden;
  }

  .game-header {
    width: 90%;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 20;
  }

  .back-btn {
    background: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  }
  .back-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }

  .progress-bar {
    flex-grow: 1;
    height: 25px;
    background: rgba(255,255,255,0.5);
    border-radius: 12.5px;
    border: 3px solid white;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--btn-orange);
    transition: width 0.1s linear;
  }

  .environment {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50%;
    background: var(--ground);
    border-top: 10px solid var(--ground-dark);
    z-index: 1;
  }

  .scenery {
    position: absolute;
    width: 200%;
    height: 100%;
    bottom: 0;
    left: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.05) 10%, transparent 10%);
    background-size: 40px 40px;
    z-index: 2;
  }

  #player {
    position: absolute;
    bottom: 20%;
    left: 50%;
    /* Variable para controlar la dirección en la que mira el sprite/emoji */
    --facing: 1;
    transform: translateX(-50%) scaleX(var(--facing));
    font-size: 5rem;
    z-index: 30;
    transition: bottom 0.3s;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Para cuando se usan sprites de imagen */
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  .instructions {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-weight: 900;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 15;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    transition: opacity 0.3s;
  }

  /* Efecto de partículas */
  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 25;
    pointer-events: none;
    opacity: 1;
    animation: fadeOutUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes fadeOutUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100px) scale(0); opacity: 0; }
  }

  @keyframes float {
    0%, 100% { transform: translateX(-50%) scaleX(var(--facing)) translateY(0); }
    50% { transform: translateX(-50%) scaleX(var(--facing)) translateY(-10px); }
  }

  /* WIN SCREEN */
  #win-screen {
    justify-content: center;
    background: var(--btn-green);
    color: white;
  }
  
  .trophy {
    font-size: 6rem;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  .time-text {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 20px 0 40px 0;
    background: rgba(0,0,0,0.1);
    padding: 10px 20px;
    border-radius: 20px;
  }

</style>
</head>
<body>

  <!-- PANTALLA DE INICIO -->
  <div id="home-screen" class="screen active">
    <div class="title-card">
      <h1>Mini<br>Trips!</h1>
    </div>

    <div class="mode-selector">
      <button class="mode-btn selected" data-mode="coche" onclick="selectMode('coche', this)">🚗</button>
      <button class="mode-btn" data-mode="barco" onclick="selectMode('barco', this)">⛵</button>
      <button class="mode-btn" data-mode="avion" onclick="selectMode('avion', this)">✈️</button>
    </div>

    <button class="play-btn" onclick="startGame()">¡JUGAR!</button>

    <div class="sprite-config">
      <label>
        <input type="checkbox" id="use-sprites">
        Usar Sprites Locales
      </label>
      <div class="sprite-hint">
        (Carpeta "sprites/": coche.png, barco.png, avion.png)
      </div>
    </div>
  </div>

  <!-- PANTALLA DE JUEGO -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="back-btn" id="back-btn">⬅️</button>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="environment" id="environment">
      <div class="scenery" id="scenery"></div>
    </div>

    <div id="player" style="animation: float 2s infinite ease-in-out;">🚗</div>

    <div class="instructions" id="game-hints">
      Toca los lados para avanzar.<br>¡Desliza rápido para acelerar!
    </div>
  </div>

  <!-- PANTALLA DE VICTORIA -->
  <div id="win-screen" class="screen">
    <div class="trophy">🏆</div>
    <h1>¡LLEGASTE!</h1>
    <div class="time-text">Tiempo: <span id="time-display">0.0</span>s</div>
    <button class="play-btn" style="background: var(--btn-orange); box-shadow: 0 8px 0 var(--btn-orange-dark);" onclick="goHome()">Volver al Menú</button>
  </div>

<script>
  // --- INYECCIÓN DE MANIFEST PWA EN TIEMPO DE EJECUCIÓN ---
  // Esto hace que el navegador lo detecte como instalable sin necesidad de un archivo extra.
  const manifestJSON = {
    "name": "Mini Trips",
    "short_name": "Mini Trips",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#87CEEB",
    "theme_color": "#87CEEB",
    "icons": [
      {
        "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2387CEEB'/%3E%3Ctext y='65' x='15' font-size='60'%3E🚗%3C/text%3E%3C/svg%3E",
        "sizes": "192x192",
        "type": "image/svg+xml"
      }
    ]
  };
  const manifestData = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestJSON));
  const linkManifest = document.createElement('link');
  linkManifest.rel = 'manifest';
  linkManifest.href = manifestData;
  document.head.appendChild(linkManifest);
  // --------------------------------------------------------

  // --- VARIABLES DEL JUEGO ---
  let currentMode = 'coche';
  let isRunning = false;
  let progress = 0; // 0 a 100
  let speed = 0;
  let maxSpeed = 25; // Aumentado para permitir aceleración rápida
  let mediumSpeed = 4; // Velocidad de avance al mantener tocado
  let distanceScrolled = 0;
  let startTime = 0;
  let gameLoopReq;

  // Variables de control táctil
  let isTouching = false;
  let touchX = 0;
  let lastTouchX = 0;
  let lastTouchTime = 0;

  // Configuración por modo de transporte
  const config = {
    coche: { 
      emoji: '🚗', 
      envColor: 'var(--ground)', 
      borderColor: 'var(--ground-dark)', 
      bottomPos: '25%',
      particleColors: ['#FFD93D', '#FFFFFF', '#AAAAAA']
    },
    barco: { 
      emoji: '⛵', 
      envColor: 'var(--water)', 
      borderColor: 'var(--water-dark)', 
      bottomPos: '35%',
      particleColors: ['#FFFFFF', '#B8E4F9', '#4FC3F7']
    },
    avion: { 
      emoji: '✈️', 
      envColor: 'transparent', 
      borderColor: 'transparent', 
      bottomPos: '60%',
      particleColors: ['#FFFFFF', '#FFFFFF', '#B8E4F9']
    }
  };

  // --- LÓGICA DE INTERFAZ ---

  function selectMode(mode, btnElement) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
    btnElement.classList.add('selected');
  }

  function goHome() {
    isRunning = false;
    cancelAnimationFrame(gameLoopReq);
    document.getElementById('win-screen').classList.remove('active');
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('active');
  }

  // Evento Botón Atrás
  document.getElementById('back-btn').addEventListener('click', () => {
    goHome();
  });

  function startGame() {
    // Configurar entorno y jugador
    const env = document.getElementById('environment');
    const player = document.getElementById('player');
    const cfg = config[currentMode];
    const useSprites = document.getElementById('use-sprites').checked;

    env.style.background = cfg.envColor;
    env.style.borderTopColor = cfg.borderColor;
    player.style.bottom = cfg.bottomPos;
    player.style.setProperty('--facing', '1'); // Resetear dirección hacia la derecha

    // Lógica para cargar Emojis o Sprites locales
    if (useSprites) {
      player.innerHTML = '';
      // Se asume la existencia de la carpeta 'sprites/' junto a este index.html
      player.style.backgroundImage = `url('sprites/${currentMode}.png')`;
    } else {
      player.style.backgroundImage = 'none';
      player.innerHTML = cfg.emoji;
    }

    // Reiniciar variables
    progress = 0;
    speed = 0;
    distanceScrolled = 0;
    isTouching = false;
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('game-hints').style.opacity = '1';
    startTime = Date.now();
    isRunning = true;

    // Cambiar pantallas
    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');

    gameLoop();
  }

  // --- LÓGICA DE JUEGO PRINCIPAL Y CONTROLES TÁCTILES ---

  const gameScreen = document.getElementById('game-screen');
  
  const hideHints = () => {
    document.getElementById('game-hints').style.opacity = '0';
  };

  gameScreen.addEventListener('pointerdown', (e) => {
    if (!isRunning || e.target.id === 'back-btn') return;
    isTouching = true;
    touchX = e.clientX;
    lastTouchX = e.clientX;
    lastTouchTime = Date.now();
    hideHints();
  });

  gameScreen.addEventListener('pointermove', (e) => {
    if (!isRunning || !isTouching) return;
    
    const now = Date.now();
    const dt = now - lastTouchTime;
    touchX = e.clientX;
    
    // Calcular velocidad del deslizamiento (swipe)
    if (dt > 0) {
      const swipeVelocity = (touchX - lastTouchX) / dt;
      // Inyectar impulso extra a la velocidad basado en el deslizamiento
      speed += swipeVelocity * 6; // Sensibilidad del swipe
    }
    
    lastTouchX = touchX;
    lastTouchTime = now;
  });

  const endTouch = () => {
    isTouching = false;
  };

  gameScreen.addEventListener('pointerup', endTouch);
  gameScreen.addEventListener('pointercancel', endTouch);
  gameScreen.addEventListener('pointerleave', endTouch);

  function spawnParticle(direction) {
    const cfg = config[currentMode];
    const c = cfg ? cfg.particleColors : ['#FFD93D'];
    const p = document.createElement('div');
    const playerRect = document.getElementById('player').getBoundingClientRect();
    
    p.className = 'particle';
    p.style.background = c[Math.floor(Math.random() * c.length)];
    p.style.width = p.style.height = (8 + Math.random() * 6) + 'px';
    
    // Posicionar detrás del jugador según la dirección
    const offset = direction > 0 ? -25 : 25;
    const leftOffset = playerRect.left + (playerRect.width / 2) + offset + (Math.random() * 20 - 10);
    const bottomOffset = window.innerHeight - playerRect.bottom + (Math.random() * 20);
    
    p.style.left = leftOffset + 'px';
    p.style.bottom = bottomOffset + 'px';
    
    document.getElementById('game-screen').appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }

  function gameLoop() {
    if (!isRunning) return;

    // --- FÍSICA Y MOVIMIENTO ---
    let targetSpeed = 0;
    const screenCenter = window.innerWidth / 2;

    if (isTouching) {
      // Velocidad media constante al mantener tocado
      targetSpeed = (touchX > screenCenter) ? mediumSpeed : -mediumSpeed;
      
      // Acelerar suavemente hacia la velocidad media si vamos más lento
      if (targetSpeed > 0 && speed < targetSpeed) speed += 0.5;
      if (targetSpeed < 0 && speed > targetSpeed) speed -= 0.5;
    }

    // Fricción constante para que los impulsos se desaceleren suavemente
    speed *= 0.93;

    // Limitar velocidad máxima
    if (speed > maxSpeed) speed = maxSpeed;
    if (speed < -maxSpeed) speed = -maxSpeed;
    
    // Detener por completo si va muy lento y no se está tocando
    if (!isTouching && Math.abs(speed) < 0.2) speed = 0;

    // Progreso (limitado para no retroceder antes del inicio ni pasar del fin)
    progress += speed * 0.05;
    if (progress < 0) progress = 0; 
    
    if (progress >= 100) {
      progress = 100;
      winGame();
    }
    
    // Actualizar UI de progreso
    document.getElementById('progress-fill').style.width = progress + '%';

    // Animación infinita del escenario
    distanceScrolled += speed * 2;
    // Cálculo seguro del módulo para números negativos
    const bgPos = ((distanceScrolled % window.innerWidth) + window.innerWidth) % window.innerWidth;
    document.getElementById('scenery').style.transform = `translateX(-${bgPos}px)`;

    // Orientación visual del jugador según la inercia (voltear a la izquierda/derecha)
    const player = document.getElementById('player');
    if (speed < -0.5) {
      player.style.setProperty('--facing', '-1');
    } else if (speed > 0.5) {
      player.style.setProperty('--facing', '1');
    }

    // Generar partículas dinámicamente cuando hay altas velocidades
    if (Math.abs(speed) > mediumSpeed * 1.5 && Math.random() > 0.6) {
      spawnParticle(Math.sign(speed));
    }

    gameLoopReq = requestAnimationFrame(gameLoop);
  }

  function winGame() {
    isRunning = false;
    const timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById('time-display').innerText = timeTaken;
    
    setTimeout(() => {
      document.getElementById('game-screen').classList.remove('active');
      document.getElementById('win-screen').classList.add('active');
    }, 500);
  }

</script>
</body>
</html>
