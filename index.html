<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- =========================================================================
     1. CONFIGURACIÓN DEL NAVEGADOR
     ========================================================================= -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mini Trips">
<meta name="theme-color" content="#87CEEB">

<title>Mini Trips!</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  /* =========================================================================
     2. VARIABLES DE DISEÑO NATURALISTA
     ========================================================================= */
  :root {
    /* Paletas de Cielo y UI */
    --sky-top: #6CB2EB;
    --sky-bottom: #BBE3FA;
    --sunset-top: #FF9A9E;
    --sunset-bottom: #FECFEF;
    --ui-bg: #FFF8EC;
    --ui-shadow: rgba(0,0,0,0.18);
    
    /* Botones */
    --btn-green: #5DD15A;
    --btn-green-dark: #3FAD3C;
    --btn-orange: #FF8A3D;
    --btn-orange-dark: #E06820;
    --btn-blue: #4FC3F7;
    --btn-blue-dark: #29B6F6;
  }

  /* =========================================================================
     3. RESETEO Y ESTILOS BASE
     ========================================================================= */
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background-color: var(--sky-top);
    touch-action: none;
  }

  h1, h2, h3 {
    font-family: 'Fredoka One', cursive;
    margin: 0;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
  }

  /* =========================================================================
     4. GESTOR DE PANTALLAS Y UI
     ========================================================================= */
  .screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: env(safe-area-inset-top, 47px);
    padding-bottom: env(safe-area-inset-bottom, 34px);
    z-index: 50;
  }

  .screen.active {
    display: flex;
  }

  /* --- INICIO --- */
  #home-screen {
    justify-content: center;
    gap: clamp(10px, 4vh, 30px);
    background: var(--ui-bg);
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    flex-direction: column !important;
  }
  
  .title-card {
    background: white;
    padding: clamp(10px, 2vh, 20px) clamp(20px, 6vw, 40px);
    border-radius: clamp(15px, 4vh, 30px);
    box-shadow: 0 10px 20px var(--ui-shadow);
    text-align: center;
    border: 4px solid var(--sky-bottom);
    margin: 0;
  }

  .title-card h1 {
    font-size: clamp(1.8rem, 6vmin, 3.5rem);
    color: var(--btn-orange);
    white-space: nowrap;
    margin: 0;
  }

  .mode-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(8px, 2vw, 20px);
    justify-content: center;
    width: 100%;
    max-width: 500px;
  }

  .mode-btn {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 110px;
    max-height: 110px;
    border-radius: clamp(12px, 4vmin, 25px);
    border: 3px solid white;
    background-color: white;
    box-shadow: 0 6px 0 var(--sky-bottom), 0 8px 10px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    background-size: 80%; 
    background-position: center;
    background-repeat: no-repeat;
  }

  .mode-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 var(--sky-bottom);
    border: 3px solid var(--btn-orange);
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #home-screen {
      gap: 15px;
      padding-top: env(safe-area-inset-top, 10px);
      padding-bottom: env(safe-area-inset-bottom, 10px);
    }
    .mode-selector { max-width: 450px; }
    .mode-btn { box-shadow: 0 4px 0 var(--sky-bottom); }
    .mode-btn:active { transform: translateY(4px); }
  }

  /* =========================================================================
     5. JUEGO Y SISTEMA PARALLAX
     ========================================================================= */
  #game-screen {
    justify-content: space-between;
    overflow: hidden;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    transition: background 0.5s ease;
    z-index: 10;
  }

  .game-header {
    width: 90%;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 50;
  }

  .back-btn {
    background: white;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    order: 2;
  }
  .back-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }

  .progress-bar {
    flex-grow: 1;
    height: 25px;
    background: rgba(255,255,255,0.5);
    border-radius: 12.5px;
    border: 3px solid white;
    overflow: hidden;
    position: relative;
    order: 1;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--btn-orange);
    transition: width 0.1s linear;
  }

  /* --- CAPAS DE PROFUNDIDAD (PARALLAX) --- */
  .parallax-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    will-change: transform;
  }

  #parallax-far { z-index: 1; }  
  #parallax-mid { z-index: 2; }  
  #track { z-index: 15; }        

  #dynamic-water {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 8;
    display: none;
  }

  /* --- ELEMENTOS DEL MUNDO --- */
  .start-line, .finish-line {
    position: absolute;
    width: 20px;
    height: 140px;
    background: repeating-linear-gradient(0deg, #fff, #fff 15px, #000 15px, #000 30px);
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    box-shadow: 3px 0 10px rgba(0,0,0,0.2);
    border-radius: 5px 5px 0 0;
  }
  
  .start-line::after {
    content: 'INICIO';
    position: absolute;
    bottom: 150px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-green);
  }

  .finish-line::after {
    content: 'META';
    position: absolute;
    bottom: 150px;
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-orange);
  }

  .finish-line::before {
    content: '🏁';
    position: absolute;
    bottom: 190px;
    font-size: 4rem;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.3));
  }

  .track-marker {
    position: absolute;
    background: var(--btn-blue);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    border: 3px solid white;
    box-shadow: 0 3px 0 var(--btn-blue-dark), 0 4px 6px rgba(0,0,0,0.2);
    transform: translateX(-50%);
  }

  .track-decor {
    position: absolute;
    font-size: 3.5rem;
    transform: translateX(-50%);
    filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
  }

  .parallax-decor {
    position: absolute;
    transform: translateX(-50%);
  }

  /* --- SPRITE DEL JUGADOR --- */
  #player {
    position: absolute;
    bottom: 20%;
    left: 50%;
    --facing: -1; 
    transform: translateX(-50%) scaleX(var(--facing));
    z-index: 30;
    width: 100px;
    height: 100px;
    background-color: transparent;
    background-size: contain;
    background-position: center bottom;
    background-repeat: no-repeat;
    filter: drop-shadow(0px 6px 4px rgba(0,0,0,0.35));
  }

  .instructions {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-weight: 900;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 40;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    transition: opacity 0.3s;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 25;
    pointer-events: none;
    opacity: 1;
    animation: fadeOutUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes fadeOutUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100px) scale(0); opacity: 0; }
  }

  /* --- VICTORIA --- */
  #win-screen {
    justify-content: center;
    background: var(--btn-green);
    color: white;
    z-index: 100;
  }
  
  #win-screen h1 {
    font-size: 4rem;
    margin-bottom: 30px;
  }

  .trophy {
    font-size: 6rem;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 10px;
  }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }
  
  .play-btn {
    background: var(--btn-green);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    padding: 15px 50px;
    border: none;
    border-radius: 30px;
    box-shadow: 0 8px 0 var(--btn-green-dark);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .play-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 var(--btn-green-dark);
  }

</style>
</head>
<body>

  <!-- PANTALLA INICIO -->
  <div id="home-screen" class="screen active">
    <div class="title-card">
      <h1>Mini Trips!</h1>
    </div>
    <div class="mode-selector">
      <button class="mode-btn" data-mode="coche" onpointerdown="selectMode('coche')" style="background-image: url('sprites/coche.png');"></button>
      <button class="mode-btn" data-mode="tren" onpointerdown="selectMode('tren')" style="background-image: url('sprites/tren.png');"></button>
      <button class="mode-btn" data-mode="barco" onpointerdown="selectMode('barco')" style="background-image: url('sprites/barco.png');"></button>
      <button class="mode-btn" data-mode="avion" onpointerdown="selectMode('avion')" style="background-image: url('sprites/avion.png');"></button>
    </div>
  </div>

  <!-- PANTALLA JUEGO -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="back-btn" id="back-btn">⬅️</button>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- CAPAS PARALLAX -->
    <div id="parallax-far" class="parallax-layer"></div>
    <div id="parallax-mid" class="parallax-layer"></div>

    <!-- AGUA DINÁMICA (BARCO & AVIÓN) -->
    <svg id="dynamic-water">
      <path id="water-path-bg" fill="#2278A8" opacity="0.8" />
      <path id="water-path" fill="#3A9FD8" opacity="0.95" />
    </svg>

    <!-- PISTA Y JUGADOR (CAPA FRONTAL) -->
    <div id="track" class="parallax-layer"></div>
    
    <div id="player"></div>

    <div class="instructions" id="game-hints">
      Toca los lados para avanzar.<br>¡Desliza rápido para acelerar!
    </div>
  </div>

  <!-- PANTALLA VICTORIA -->
  <div id="win-screen" class="screen">
    <div class="trophy">🏆</div>
    <h1>¡LLEGASTE!</h1>
    <button class="play-btn" style="background: var(--btn-orange); box-shadow: 0 8px 0 var(--btn-orange-dark);" onpointerdown="goHome()">Volver al Menú</button>
  </div>

<script>
  // --- VARIABLES GLOBALES ---
  let currentMode = 'coche';
  let isRunning = false;
  let progress = 0;
  let speed = 0;
  let maxSpeed = 25;
  let mediumSpeed = 4;
  let gameLoopReq;

  // Touch
  let isTouching = false;
  let touchX = 0, lastTouchX = 0;
  let touchY = 0, lastTouchY = 0;
  let lastTouchTime = 0;

  // Física
  let yPos = 0;
  let ySpeed = 0;
  let baseY_px = 0;
  let dynamicBaseY_px = 0; 
  let gravity = 0.6;
  let rotationAngle = 0;

  // Terreno
  let terrainSeeds = null;
  let terrainSeedsBg = null; 
  const TRACK_LENGTH = 20000; 

  // --- CONFIGURACIÓN DE MODOS ---
  const config = {
    coche: { 
      spriteUrl: 'sprites/coche.png', bottomPos: '25%',
      skyTop: '#6CB2EB', skyBottom: '#BBE3FA',
      fgColor: '#6BBF4E', fgStroke: '#4E9B35', fgFill: '#5DAF42',
      bgColor: '#86CD6A', bgStroke: 'none', bgFill: '#79BC5F',     
      particleColors: ['#FFD93D', '#FFFFFF', '#AAAAAA'],
      decorNear: ['🌲', '🌳', '🪨', '🌻', '🛑', '🪵', '🏕️'],
      decorMid: ['🌲', '🌳', '🏡', '🐑', '🐄'],
      decorFar: ['☁️', '☀️', '🦅', '⛰️']
    },
    tren: { 
      spriteUrl: 'sprites/tren.png', bottomPos: '25%',
      skyTop: '#FF9A9E', skyBottom: '#FECFEF', 
      fgColor: '#A0522D', fgStroke: '#6D381D', fgFill: '#8A4525', 
      bgColor: '#C2754E', bgStroke: '#995635', bgFill: '#B2623C', 
      particleColors: ['#555555', '#333333', '#888888', '#FFD93D'],
      decorNear: ['🌵', '🪨', '🪵', '🛤️', '🤠', '🐍'],
      decorMid: ['🛖', '🌵', '🏜️', '⛰️', '🦅'],
      decorFar: ['☁️', '⛅', '🌅', '🏜️']
    },
    barco: { 
      spriteUrl: 'sprites/barco.png', bottomPos: '35%',
      skyTop: '#40C4FF', skyBottom: '#E1F5FE',
      particleColors: ['#FFFFFF', '#B8E4F9', '#4FC3F7'],
      decorNear: ['🛟', '🐟', '🐙', '⚓', '🐬'],
      decorMid: ['🏝️', '⛵', '🛳️', '⛰️'],
      decorFar: ['☁️', '☀️', '🦅', '☁️']
    },
    avion: { 
      spriteUrl: 'sprites/avion.png', bottomPos: '60%',
      skyTop: '#1E88E5', skyBottom: '#90CAF9',
      particleColors: ['#FFFFFF', '#FFFFFF', '#B8E4F9'],
      decorNear: ['🦅', '🎈', '🚁', '✨'],
      decorMid: ['☁️', '⛅', '🛸'],
      decorFar: ['☁️', '☁️', '☀️', '🗻']
    }
  };

  // --- MATEMÁTICAS DEL TERRENO ---
  function getTerrainHeight(x, seeds) {
    if (!seeds) return 0;
    
    // Forzamos a que el terreno sea completamente plano antes del inicio y después de la meta
    if (x <= 0 || x >= TRACK_LENGTH) return 0;
    
    let fade = 1;
    if (x < 1500) fade = x / 1500;
    else if (x > TRACK_LENGTH - 1500) fade = (TRACK_LENGTH - x) / 1500;
    
    const h1 = Math.sin(x / seeds.f1) * seeds.a1;
    const h2 = Math.cos(x / seeds.f2) * seeds.a2;
    const h3 = Math.sin(x / seeds.f3) * seeds.a3;
    
    return (h1 + h2 + h3) * fade;
  }

  // --- LÓGICA DEL MENÚ ---
  function selectMode(mode) {
    currentMode = mode;
    startGame();
  }

  function goHome() {
    isRunning = false;
    cancelAnimationFrame(gameLoopReq);
    document.getElementById('win-screen').classList.remove('active');
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('home-screen').classList.add('active');
  }

  document.getElementById('back-btn').addEventListener('pointerdown', goHome);

  // --- GENERACIÓN DEL MUNDO (PARALLAX Y TERRENO) ---
  function generateTrack() {
    const track = document.getElementById('track');
    const midLayer = document.getElementById('parallax-mid');
    const farLayer = document.getElementById('parallax-far');
    
    track.innerHTML = '';
    midLayer.innerHTML = '';
    farLayer.innerHTML = '';

    const cfg = config[currentMode];
    
    document.getElementById('game-screen').style.background = `linear-gradient(180deg, ${cfg.skyTop} 0%, ${cfg.skyBottom} 100%)`;

    baseY_px = (parseFloat(cfg.bottomPos) / 100) * window.innerHeight;
    const svgHeight = 2000; 

    // Activamos el agua para el barco y para el fondo del avión
    document.getElementById('dynamic-water').style.display = (currentMode === 'barco' || currentMode === 'avion') ? 'block' : 'none';

    // 1. TERRENO COCHE Y TREN (Extendidos desde -3000 a TRACK_LENGTH + 3000 para evitar bloque vacío al iniciar)
    if (currentMode === 'coche' || currentMode === 'tren') {
        let bgSVG = `<svg width="${TRACK_LENGTH + 6000}" height="${svgHeight}" style="position:absolute; bottom:0; left:0; overflow:visible;">`;
        let pathBg = `M -3000,${svgHeight} `;
        for (let x = -3000; x <= TRACK_LENGTH + 3000; x += 100) {
            pathBg += `L ${x},${svgHeight - (baseY_px + 80 + getTerrainHeight(x, terrainSeedsBg))} `;
        }
        pathBg += `L ${TRACK_LENGTH + 3000},${svgHeight} Z`; 
        bgSVG += `<path d="${pathBg}" fill="${cfg.bgFill}" stroke="${cfg.bgStroke}" stroke-width="10" stroke-linejoin="round"/>`;
        bgSVG += `</svg>`;
        midLayer.insertAdjacentHTML('beforeend', bgSVG);

        let fgSVG = `<svg width="${TRACK_LENGTH + 6000}" height="${svgHeight}" style="position:absolute; bottom:0; left:0; overflow:visible;">`;
        let pathFg = `M -3000,${svgHeight} `; 
        let pathLine = `M -3000,${svgHeight - baseY_px} `; 
        
        for (let x = -3000; x <= TRACK_LENGTH + 3000; x += 50) {
            let ty = svgHeight - (baseY_px + getTerrainHeight(x, terrainSeeds));
            pathFg += `L ${x},${ty} `;
            pathLine += `L ${x},${ty} `;
        }
        pathFg += `L ${TRACK_LENGTH + 3000},${svgHeight} Z`; 

        fgSVG += `<path d="${pathFg}" fill="${cfg.fgFill}" />`;
        
        if (currentMode === 'coche') {
            fgSVG += `<path d="${pathLine}" fill="none" stroke="${cfg.fgStroke}" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 5)"/>`;
            fgSVG += `<path d="${pathLine}" fill="none" stroke="${cfg.fgColor}" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>`;
            fgSVG += `<path d="${pathLine}" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="20, 30" stroke-linecap="round" stroke-linejoin="round"/>`;
        } else {
            fgSVG += `<path d="${pathLine}" fill="none" stroke="#5D4037" stroke-width="35" stroke-dasharray="8, 24" stroke-linecap="round" stroke-linejoin="round"/>`;
            fgSVG += `<path d="${pathLine}" fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -12)"/>`;
            fgSVG += `<path d="${pathLine}" fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 12)"/>`;
        }
        fgSVG += `</svg>`;
        track.insertAdjacentHTML('beforeend', fgSVG);
      
    } 
    // 2. ISLAS DEL AVIÓN (Creciendo desde el agua)
    else if (currentMode === 'avion') {
      let runwayY_px = (20 / 100) * window.innerHeight; 
      let rStart = TRACK_LENGTH - 3000; // La pista de aterrizaje empieza 3000px antes de la meta
      
      let fgSVG = `<svg width="${TRACK_LENGTH + 6000}" height="${svgHeight}" style="position:absolute; bottom:0; left:0; overflow:visible;">`;
      
      // Isla de Despegue (-3000 a 3200)
      let startIsland = `M -3000,${svgHeight} L -3000,${svgHeight - runwayY_px} L 2000,${svgHeight - runwayY_px} C 2500,${svgHeight - runwayY_px} 2800,${svgHeight} 3200,${svgHeight} Z`;
      // Isla de Aterrizaje (Emerge del agua, se nivela antes de la meta y se extiende)
      let endIsland = `M ${rStart - 1000},${svgHeight} C ${rStart - 600},${svgHeight} ${rStart - 200},${svgHeight - runwayY_px} ${rStart + 500},${svgHeight - runwayY_px} L ${TRACK_LENGTH + 3000},${svgHeight - runwayY_px} L ${TRACK_LENGTH + 3000},${svgHeight} Z`;

      fgSVG += `<path d="${startIsland}" fill="#6BBF4E" />`;
      fgSVG += `<path d="${endIsland}" fill="#6BBF4E" />`;
      
      let startDirt = `M -3000,${svgHeight - runwayY_px} L 2000,${svgHeight - runwayY_px} C 2500,${svgHeight - runwayY_px} 2800,${svgHeight} 3200,${svgHeight}`;
      let endDirt = `M ${rStart - 1000},${svgHeight} C ${rStart - 600},${svgHeight} ${rStart - 200},${svgHeight - runwayY_px} ${rStart + 500},${svgHeight - runwayY_px} L ${TRACK_LENGTH + 3000},${svgHeight - runwayY_px}`;
      fgSVG += `<path d="${startDirt}" fill="none" stroke="#8B4513" stroke-width="25" />`;
      fgSVG += `<path d="${endDirt}" fill="none" stroke="#8B4513" stroke-width="25" />`;

      // Decoración de pista (pavimento gris)
      fgSVG += `<line x1="-3000" y1="${svgHeight - runwayY_px - 5}" x2="1800" y2="${svgHeight - runwayY_px - 5}" stroke="#555555" stroke-width="20" stroke-linecap="round"/>`;
      fgSVG += `<line x1="${rStart + 700}" y1="${svgHeight - runwayY_px - 5}" x2="${TRACK_LENGTH + 3000}" y2="${svgHeight - runwayY_px - 5}" stroke="#555555" stroke-width="20" stroke-linecap="round"/>`;
      
      fgSVG += `</svg>`;
      track.insertAdjacentHTML('beforeend', fgSVG);
    }

    // Posición estricta de las líneas de Meta e Inicio
    let lineBottomPx = baseY_px;
    if (currentMode === 'avion') lineBottomPx = (20 / 100) * window.innerHeight;

    const start = document.createElement('div');
    start.className = 'start-line';
    start.style.left = '0px';
    start.style.bottom = lineBottomPx + 'px';
    track.appendChild(start);

    const finish = document.createElement('div');
    finish.className = 'finish-line';
    finish.style.left = TRACK_LENGTH + 'px';
    finish.style.bottom = lineBottomPx + 'px';
    track.appendChild(finish);

    function addDecor(layer, decorArray, count, speedMultiplier, isTrack = false) {
      if (!decorArray || decorArray.length === 0) return;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = isTrack ? 'track-decor' : 'parallax-decor';
        el.innerText = decorArray[Math.floor(Math.random() * decorArray.length)];
        
        let logicalPos;
        // Restricción para que en avión no salgan árboles sobre el agua
        if (currentMode === 'avion' && isTrack) {
           if (Math.random() > 0.5) {
               logicalPos = -2000 + Math.random() * 4000; 
           } else {
               logicalPos = (TRACK_LENGTH - 2000) + Math.random() * 4000; 
           }
        } else {
           // Decoración repartida desde antes del comienzo hasta después del final
           logicalPos = -2000 + Math.random() * (TRACK_LENGTH + 4000); 
        }
        
        const renderPos = logicalPos * speedMultiplier;
        el.style.left = renderPos + 'px';
        
        let elHeight = baseY_px;
        let vOffset = 0;
        let scale = 1;

        if (isTrack) {
            elHeight += getTerrainHeight(logicalPos, terrainSeeds);
            if (currentMode === 'avion') {
                elHeight = (20 / 100) * window.innerHeight; // Nivel de la isla
                vOffset = (Math.random() - 0.2) * 50;
            } else if (currentMode === 'barco') {
                vOffset = (Math.random() - 0.2) * 200;
            } else {
                vOffset = (Math.random() - 0.5) * 40;
            }
            scale = 0.6 + Math.random() * 0.8;
            el.style.zIndex = Math.random() > 0.5 ? 14 : 16; 
        } else if (layer === midLayer) {
            elHeight += getTerrainHeight(logicalPos, terrainSeedsBg) + 80;
            vOffset = Math.random() * 50;
            scale = 0.4 + Math.random() * 0.4; 
            el.style.opacity = 0.8;
        } else {
            elHeight = window.innerHeight * (0.6 + Math.random() * 0.3);
            scale = 1 + Math.random();
            el.style.opacity = 0.6;
        }
        
        el.style.bottom = (elHeight + vOffset) + 'px';
        el.style.transform = `translateX(-50%) scale(${scale})`;
        layer.appendChild(el);
      }
    }

    addDecor(track, cfg.decorNear, 80, 1.0, true);
    addDecor(midLayer, cfg.decorMid, 50, 0.5);
    addDecor(farLayer, cfg.decorFar, 40, 0.2);

    for (let i = 1; i <= 10; i++) {
        const marker = document.createElement('div');
        marker.className = 'track-marker';
        marker.innerText = (11 - i); 
        const markerX = TRACK_LENGTH * ((i * (100 / 11)) / 100);
        marker.style.left = markerX + 'px';
        marker.style.bottom = (baseY_px + getTerrainHeight(markerX, terrainSeeds) + 50) + 'px';
        track.appendChild(marker);
    }
  }

  function startGame() {
    const player = document.getElementById('player');
    const cfg = config[currentMode];

    player.style.backgroundImage = `url('${cfg.spriteUrl}')`;

    terrainSeeds = {
      a1: 40 + Math.random() * 40, f1: 500 + Math.random() * 500,
      a2: 25 + Math.random() * 25, f2: 250 + Math.random() * 200,
      a3: 15 + Math.random() * 15, f3: 100 + Math.random() * 100
    };
    
    terrainSeedsBg = {
      a1: 60 + Math.random() * 40, f1: 800 + Math.random() * 400,
      a2: 40 + Math.random() * 20, f2: 400 + Math.random() * 200,
      a3: 0, f3: 1
    };

    baseY_px = (parseFloat(cfg.bottomPos) / 100) * window.innerHeight;
    yPos = (currentMode === 'avion') ? (20 / 100) * window.innerHeight : baseY_px;
    ySpeed = 0;
    
    generateTrack();

    progress = 0; speed = 0; isTouching = false;
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('game-hints').style.opacity = '1';
    isRunning = true;

    document.getElementById('home-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');

    gameLoop();
  }

  // --- CONTROLES TÁCTILES ---
  const gameScreen = document.getElementById('game-screen');
  gameScreen.addEventListener('pointerdown', (e) => {
    if (!isRunning || e.target.id === 'back-btn') return;
    isTouching = true;
    touchX = e.clientX; lastTouchX = e.clientX;
    touchY = e.clientY; lastTouchY = e.clientY;
    lastTouchTime = Date.now();
    document.getElementById('game-hints').style.opacity = '0';
  });

  gameScreen.addEventListener('pointermove', (e) => {
    if (!isRunning || !isTouching) return;
    const now = Date.now();
    const dt = now - lastTouchTime;
    touchX = e.clientX; touchY = e.clientY;
    
    if (dt > 0) {
      const swipeVelocityX = (touchX - lastTouchX) / dt;
      speed += swipeVelocityX * 6;
      const swipeVelocityY = (lastTouchY - touchY) / dt;
      if (currentMode !== 'tren') {
        let clampedY = Math.max(-15, Math.min(15, swipeVelocityY));
        ySpeed += clampedY * 1.5;
      }
    }
    lastTouchX = touchX; lastTouchY = touchY; lastTouchTime = now;
  });

  const endTouch = () => { isTouching = false; };
  gameScreen.addEventListener('pointerup', endTouch);
  gameScreen.addEventListener('pointercancel', endTouch);
  gameScreen.addEventListener('pointerleave', endTouch);

  function spawnParticle(direction) {
    const cfg = config[currentMode];
    const c = cfg ? cfg.particleColors : ['#FFD93D'];
    const p = document.createElement('div');
    const playerRect = document.getElementById('player').getBoundingClientRect();
    
    p.className = 'particle';
    p.style.background = c[Math.floor(Math.random() * c.length)];
    p.style.width = p.style.height = (8 + Math.random() * 6) + 'px';
    
    const offset = direction > 0 ? -25 : 25;
    const leftOffset = playerRect.left + (playerRect.width / 2) + offset + (Math.random() * 20 - 10);
    const bottomOffset = window.innerHeight - playerRect.bottom + (Math.random() * 20);
    
    p.style.left = leftOffset + 'px';
    p.style.bottom = bottomOffset + 'px';
    
    document.getElementById('game-screen').appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }

  // --- BUCLE PRINCIPAL (FÍSICA Y PARALLAX) ---
  function gameLoop() {
    if (!isRunning) return;

    let targetSpeed = 0;
    const screenCenter = window.innerWidth / 2;

    if (isTouching) {
      targetSpeed = (touchX > screenCenter) ? mediumSpeed : -mediumSpeed;
      if (targetSpeed > 0 && speed < targetSpeed) speed += 0.5;
      if (targetSpeed < 0 && speed > targetSpeed) speed -= 0.5;
    }

    speed *= 0.93; 
    if (speed > maxSpeed) speed = maxSpeed;
    if (speed < -maxSpeed) speed = -maxSpeed;
    
    if (!isTouching) {
      if (currentMode === 'avion') {
        if (speed < mediumSpeed) speed += 0.2;
      } else if (Math.abs(speed) < 0.2) {
        speed = 0;
      }
    }

    progress += speed * 0.005; 
    if (progress < 0) progress = 0; 
    
    let playerWorldX = (progress / 100) * TRACK_LENGTH;
    
    // --- LÓGICA DEL AGUA ---
    if (currentMode === 'barco' || currentMode === 'avion') {
      let time = Date.now();
      let waveTime = time * 0.002;
      let waveTimeBg = time * 0.0015;

      // El agua del avión la dibujamos un poco más abajo para que las islas destaquen por encima
      let waterBaseY = (currentMode === 'avion') ? window.innerHeight * 0.15 : baseY_px;

      // Generamos olas más anchas y suaves (bajando la frecuencia espacial a 0.004 y 0.002)
      let waveH = Math.sin(playerWorldX * 0.004 + waveTime) * 15 + Math.sin(playerWorldX * 0.002 + waveTime * 1.5) * 10;
      if (currentMode === 'barco') {
         dynamicBaseY_px = waterBaseY + waveH;
      }

      let pathFg = `M -100, ${window.innerHeight} `;
      let pathBg = `M -100, ${window.innerHeight} `;

      for(let px = -50; px <= window.innerWidth + 50; px += 50) {
        let wX = playerWorldX + (px - window.innerWidth/2);

        // Olas de primer plano (frecuencia más baja)
        let fgH = Math.sin(wX * 0.004 + waveTime) * 15 + Math.sin(wX * 0.002 + waveTime * 1.5) * 10;
        let fgY = window.innerHeight - (waterBaseY + fgH);
        pathFg += `L ${px}, ${fgY} `;

        // Olas de fondo (frecuencia aún más baja)
        let bgH = Math.sin(wX * 0.003 + waveTimeBg + 10) * 12 + Math.sin(wX * 0.0015 + waveTimeBg * 1.2) * 15;
        let bgY = window.innerHeight - (waterBaseY + bgH + 15);
        pathBg += `L ${px}, ${bgY} `;
      }

      pathFg += `L ${window.innerWidth + 100}, ${window.innerHeight} Z`;
      pathBg += `L ${window.innerWidth + 100}, ${window.innerHeight} Z`;

      document.getElementById('water-path').setAttribute('d', pathFg);
      document.getElementById('water-path-bg').setAttribute('d', pathBg);

      if (currentMode === 'barco') {
         // Ajustamos la derivada a la nueva frecuencia y aumentamos el multiplicador final (x4) para que el balanceo siga notándose de forma suave
         let waveDeriv = Math.cos(playerWorldX * 0.004 + waveTime) * 15 * 0.004 + Math.cos(playerWorldX * 0.002 + waveTime * 1.5) * 10 * 0.002;
         rotationAngle = waveDeriv * (180 / Math.PI) * 4;
      }
    } else {
      dynamicBaseY_px = baseY_px + getTerrainHeight(playerWorldX, terrainSeeds);
    }

    yPos += ySpeed;

    // --- FÍSICA Y ALTURAS POR MODO ---
    if (currentMode === 'coche') {
      let currentGravity = isTouching ? gravity * 0.15 : gravity;
      ySpeed -= currentGravity;
      if (yPos <= dynamicBaseY_px) {
        yPos = dynamicBaseY_px;
        ySpeed = ySpeed < -3 ? Math.abs(ySpeed) * 0.3 : 0;
      }
    } else if (currentMode === 'tren') {
      yPos = dynamicBaseY_px;
      ySpeed = 0;
    } else if (currentMode === 'barco') {
      if (yPos > dynamicBaseY_px) {
        let currentGravity = isTouching ? gravity * 0.2 : gravity;
        ySpeed -= currentGravity; 
      } else if (yPos < dynamicBaseY_px) {
        let buoyancy = isTouching ? gravity * 0.8 : gravity * 1.8; 
        ySpeed += buoyancy; 
        ySpeed *= 0.85; 
      } else {
        ySpeed *= 0.8;
      }
    } else if (currentMode === 'avion') {
      let runwayY_px = (20 / 100) * window.innerHeight;
      let cruiseY_px = baseY_px; // 60% altitud de vuelo
      const tDist = 2000;
      let rStart = TRACK_LENGTH - 3000;
      let descentStart = rStart - 1500; 
      let descentEnd = rStart + 500;   

      // Despegue (Isla inicial)
      if (playerWorldX < tDist) {
        let p = playerWorldX / tDist; 
        yPos = runwayY_px + (cruiseY_px - runwayY_px) * (p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
        ySpeed = 0;
        if (speed < mediumSpeed) speed += 0.2;
      } 
      // Descenso hacia la isla final
      else if (playerWorldX > descentStart && playerWorldX <= descentEnd) {
        let p = (playerWorldX - descentStart) / (descentEnd - descentStart);
        yPos = cruiseY_px - (cruiseY_px - runwayY_px) * (p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2);
        ySpeed = 0;
      } 
      // Aterrizaje completado (corriendo sobre la pista)
      else if (playerWorldX > descentEnd) {
        yPos = runwayY_px;
        ySpeed = 0;
        if (speed < mediumSpeed) speed += 0.2; 
      } 
      // Vuelo normal
      else {
        ySpeed *= 0.92;
        if (yPos < cruiseY_px * 0.5) { // Limitar para que no toque el agua accidentalmente
          yPos = cruiseY_px * 0.5;
          if (ySpeed < 0) ySpeed = 0;
        }
      }
    }

    const maxVisibleHeight = window.innerHeight - 100;
    if (yPos > maxVisibleHeight) {
      yPos = maxVisibleHeight;
      if (ySpeed > 0) ySpeed = 0;
    }
    
    // --- ROTACIÓN ---
    if (currentMode === 'coche' || currentMode === 'tren') {
      const th1 = getTerrainHeight(playerWorldX, terrainSeeds);
      const th2 = getTerrainHeight(playerWorldX + 20, terrainSeeds); 
      rotationAngle = Math.atan2(th2 - th1, 20) * (180 / Math.PI);
    } else if (currentMode === 'avion') {
      const tDist = 2000;
      let rStart = TRACK_LENGTH - 3000;
      let descentStart = rStart - 1500;
      let descentEnd = rStart + 500;

      if (playerWorldX < tDist) {
        rotationAngle = 15 * Math.sin((playerWorldX / tDist) * Math.PI); // Cabeceo al despegar
      } else if (playerWorldX > descentStart && playerWorldX < descentEnd) {
        let p = (playerWorldX - descentStart) / (descentEnd - descentStart);
        rotationAngle = -15 * Math.sin(p * Math.PI); // Cabeceo hacia abajo al aterrizar
      } else if (playerWorldX >= descentEnd) {
        rotationAngle = 0; // Nivelado en la pista final
      } else {
        rotationAngle = ySpeed * 1.5;
      }
    }

    // --- RENDERIZADO DEL SPRITE ---
    const player = document.getElementById('player');
    const currentFacing = parseFloat(player.style.getPropertyValue('--facing') || -1);
    const newFacing = speed > 0.5 ? 1 : (speed < -0.5 ? -1 : currentFacing);
    player.style.setProperty('--facing', newFacing);
    
    player.style.bottom = yPos + 'px';
    player.style.transform = `translateX(-50%) rotate(${-rotationAngle}deg) scaleX(var(--facing))`;
    
    if (progress >= 100) {
      progress = 100;
      winGame();
    }
    
    document.getElementById('progress-fill').style.width = progress + '%';
    
    const trackX = screenCenter - playerWorldX;
    document.getElementById('track').style.transform = `translateX(${trackX}px)`;
    document.getElementById('parallax-mid').style.transform = `translateX(${trackX * 0.5}px)`;
    document.getElementById('parallax-far').style.transform = `translateX(${trackX * 0.2}px)`;

    if (Math.abs(speed) > mediumSpeed * 1.5 && Math.random() > 0.6) {
      spawnParticle(Math.sign(speed));
    }

    gameLoopReq = requestAnimationFrame(gameLoop);
  }

  function winGame() {
    isRunning = false;
    setTimeout(() => {
      document.getElementById('game-screen').classList.remove('active');
      document.getElementById('win-screen').classList.add('active');
    }, 500);
  }

</script>
